
groups:
- name: ester-app-alerts
  rules:
  - alert: EsterAppDown
    expr: up{job="ester-app"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Ester app down"
      description: "Prometheus cannot scrape /metrics"

  - alert: HighHTTPErrorRate
    expr: sum(rate(http_errors_total[5m])) by (path) > 0.1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High HTTP error rate"
      description: "Path {{ $labels.path }} exceeds 0.1 errors/sec"

  - record: job:http_request_latency_seconds:p95
    expr: |
      histogram_quantile(0.95, sum(rate(http_request_latency_seconds_bucket[5m])) by (le, path, method))

  - alert: HighLatencyP95
    expr: job:http_request_latency_seconds:p95 > 5
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High p95 latency"
      description: "p95 latency exceeds 5s for {{ $labels.path }} {{ $labels.method }}"
