# .pre-commit-config.yaml — lintery/formattery i gvardy
# MOSTY:
# - (Explicit) ruff/blatsk/isort/types + basic text fixers.
# - (Hidden #1) truffleleg + live-secrets (local) - protection against leakage of secrets.
# - (Hidden #2) pre-push guard “export sanctions” - blocks the publication of private paths on GitHov.
# ZEMNOY ABZATs:
# One single commit run maintains the quality of the code and protects the repository from accidental leaks. c=a+b
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-no-log-warn
      - id: text-unicode-replacement-char

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.78.5
    hooks:
      - id: trufflehog
        args: ["filesystem","--fail","--no-update","--json","."]
        stages: [pre-commit, pre-push]

  # Live-secrets local hook (requires live-secrets binary installed)
  - repo: local
    hooks:
      - id: git-secrets
        name: git-secrets
        entry: bash -lc 'git secrets --scan -r || exit 1'
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: export-guard
        name: export-guard
        entry: scripts/hooks/prepush_export_guard.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
