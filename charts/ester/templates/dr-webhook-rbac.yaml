{{- if .Values.failover.webhook.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ester.fullname" . }}-dr-webhook
  labels:
    {{- include "ester.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ester.fullname" . }}-dr-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ester.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get","patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ester.fullname" . }}-dr-webhook
  labels:
    {{- include "ester.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "ester.fullname" . }}-dr-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ester.fullname" . }}-dr-webhook
{{- end }}
