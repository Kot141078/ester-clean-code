# .github/workflows/memory_facade_lint.yml
name: Memory Facade Lint

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  memory-facade-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ESTER_MEM_FACADE_STRICT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Memory Facade Lint
        run: |
          python ci/memory_facade_lint.py
