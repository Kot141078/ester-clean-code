name: security
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '17 3 * * *'

jobs:
  sast-deps:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    - run: pip install bandit pip-audit
    - run: bandit -q -r . -f txt -o bandit.txt || true
    - run: pip-audit -r requirements.txt -l -f json -o pip-audit.json || true
    - uses: actions/upload-artifact@v4
      with:
        name: sast-and-deps
        path: |
          bandit.txt
          pip-audit.json

  trivy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: local/ester:ci
    - uses: aquasecurity/trivy-action@v0.24.0
      with:
        image-ref: local/ester:ci
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        output: trivy.txt
    - uses: actions/upload-artifact@v4
      with:
        name: trivy
        path: trivy.txt
