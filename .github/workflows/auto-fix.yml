name: Auto Fix

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  detector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: |
          pip install semgrep pytest
      - name: Run Semgrep
        run: |
          semgrep ci --config p/ci --sarif --output semgrep.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Save artifact
        uses: actions/upload-artifact@v4
        with:
          name: detector-artifacts
          path: |
            semgrep.sarif

  patcher:
    needs: detector
    runs-on: ubuntu-latest
    env:
      LMSTUDIO_URL: http://localhost:1234/v1/chat/completions
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download detector artifacts
        uses: actions/download-artifact@v4
        with:
          name: detector-artifacts
          path: artifacts
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install pytest pyyaml
      - name: Run patcher (LM Studio heuristic)
        run: |
          python scripts/ci/patcher_llm.py --sarif artifacts/semgrep.sarif --out patchset
      - name: Apply patch (if any)
        run: |
          if [ -f patchset/patch.diff ]; then
            git config user.name "ester-bot"
            git config user.email "ester-bot@noreply.local"
            git checkout -b fix/auto-$(date +%s)
            git apply patchset/patch.diff || true
            pytest -q || true
            git add -A
            git commit -m "Auto-fix: semgrep guided"
            git push -u origin HEAD
            gh pr create --title "Auto-fix (semgrep)" --body "Generated by patcher based on SARIF" || true
          else
            echo "No patch generated."
          fi
