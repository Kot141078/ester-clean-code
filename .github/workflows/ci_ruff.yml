name: CI (ruff)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (best-effort)
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt || true
      - name: Ruff
        run: |
          python -m pip install ruff
          ruff --version
          ruff check .
