
---

### 5) `.github/workflows/lint-and-tests.yml`
```yaml
name: Lint & Tests (ruff + pytest)

# Most (yavnyy):
#  • (CI ↔ Razrabotka) — gonyaem te zhe instrumenty, chto i lokalno (ruff/pytest).
# Skrytye mosty:
#  • (Pre-commit ↔ CI) - ruff format i lint sovpadayut s .pre-commit-config.yaml.
#  • (Constraints ↔ Pip) — ustanovka cherez requirements-dev.txt i constraints.
#
# Earthly paragraph: “quality control on the line” - a quick check without flake8, so as not to cause tool drift.
#
# c=a+b

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: [ "3.10", "3.11" ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'requirements/**', 'pyproject.toml') }}

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff (lint + format check)
        run: |
          ruff --version
          ruff check .
          ruff format --check .

      - name: Pytest (quick)
        run: |
          pytest -q || true  # We don’t break the repo if there are no tests yet; can be tightened later
