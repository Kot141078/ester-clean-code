# deploy/docker-compose.iml - quick launch of Esther locally
# MOSTY:
# - (Explicit) One ester service + named volume for date/.
# - (Hidden #1) Forward .env; change ports/WORKERS via env.
# - (Hidden #2) Heltnchesk pings endpoint boards.

version: "3.9"

services:
  ester:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ester
    env_file:
      - ../.env
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ester_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/synergy/board/aggregate?team_id=Recon%20A || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  ester_data: {}
