# deploy/nginx/ester_messaging.conf — primer proksi dlya Ester messaging

# MOSTY:
# - (Yavnyy) Proksiruem vebkhuki i API Ester k backend :8080.
# - (Skrytyy #1) Probrasyvaem originalnyy IP i ogranichivaem body dlya vebkhukov.
# - (Skrytyy #2) Korotkie taymauty na webhook'i, standartnye — na ostalnoe.

# ZEMNOY ABZATs:
# Kopiruy v sites-enabled i poprav server_name/upstream. Bezopasnye defolty: ogranichenie razmera tela, taymauty.

upstream ester_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name your.host.name;

    client_max_body_size 2m;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;

    # Vebkhuki Telegram/WhatsApp
    location ~ ^/(api/telegram/webhook|api/whatsapp/webhook)$ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://ester_app;
    }

    # Health/metrics
    location ~ ^/(messaging/(health|readiness|liveness)|metrics/messaging)$ {
        proxy_pass http://ester_app;
    }

    # Ostalnoe prilozhenie
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://ester_app;
    }
}
