# deployment/nginh/ester_messaging.conf - example of a proxy for Esther messaging

# MOSTY:
# - (Yavnyy) Proksiruem webkhuki i API Ester k backend:8080.
# - (Hidden #1) We forward the original IP and limit the waters for webhooks.
# - (Hidden #2) Short timeouts for webhooks, standard timeouts for the rest.

# ZEMNOY ABZATs:
# Copy to city-enabled and correct server_name/upstream. Safe defaults: body size limit, timeouts.

upstream ester_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name your.host.name;

    client_max_body_size 2m;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;

    # Webhooks Telegram/Whatsapp
    location ~ ^/(api/telegram/webhook|api/whatsapp/webhook)$ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://ester_app;
    }

    # Health/metrics
    location ~ ^/(messaging/(health|readiness|liveness)|metrics/messaging)$ {
        proxy_pass http://ester_app;
    }

    # Ostalnoe prilozhenie
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_pass http://ester_app;
    }
}
# c=a+b
