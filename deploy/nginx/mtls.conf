# deploy/nginx/mtls.conf — frontovoy Nginx s mTLS i prokidyvaniem zagolovkov dlya backend
# Drop-in: pomesti fayl v katalog deploya i podklyuchi v nginx.conf cherez include.

upstream ester_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
  listen 443 ssl http2;
  server_name _;

  # --- Servernye sertifikaty (podstav svoi puti) ---
  ssl_certificate           /etc/nginx/certs/server.crt;
  ssl_certificate_key       /etc/nginx/certs/server.key;

  # --- Doverie klientskim sertifikatam (mTLS) ---
  ssl_client_certificate    /etc/nginx/certs/ca.crt;
  ssl_verify_client         on;     # trebuem client cert
  ssl_verify_depth          2;

  # --- Rekomendovannye nastroyki TLS ---
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       10m;

  # --- Bezopasnye zagolovki (bazovyy nabor) ---
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header X-XSS-Protection "1; mode=block";

  # --- Proksirovanie k Flask/WSGI-bekendu ---
  location / {
    proxy_pass                          http://ester_backend;
    proxy_http_version                  1.1;
    proxy_set_header Connection         "";
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  https;

    # Prokidyvaem rezultaty verifikatsii klienta (ispolzuetsya routes/mtls_guard.py)
    proxy_set_header X-Client-Verified  $ssl_client_verify;        # SUCCESS / FAILED
    proxy_set_header X-Client-DN        $ssl_client_s_dn;          # polnyy DN iz cert
    proxy_set_header X-Client-Cert-Hash $ssl_client_fingerprint;   # SHA256 otpechatok

    # Taymauty
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;
    send_timeout            30s;
  }

  # Optsionalno: healthcheck bez mTLS (tolko lokalnyy dostup/ACL)
  location = /health {
    allow 127.0.0.1;
    deny all;
    proxy_pass http://ester_backend/health;
  }

  # Logi
  access_log /var/log/nginx/ester_access.log;
  error_log  /var/log/nginx/ester_error.log warn;
}
