# config/privacy_policies.yaml — politika stels/privatnosti (primer)
# MOSTY:
# - (Explicit) Default options for editing and crawling.
# - (Hidden #1) Priority of ENV over YML; YML - as default documentation/seed.
# - (Hidden #2) Different profiles: dev/experienced/prod (below - prod, as “quiet”).
# ZEMNOY ABZATs:
# One file describes the "loudness" of the system. In production there is a cautious regime with respect for the rules of the sites. c=a+b

profile: prod

redaction:
  enable: true
  keep_last_n: 4

crawler:
  user_agent: Ester-Integrator/1.0
  respect_robots: true
  disallow_archives: true
  cache_ttl_sec: 900
  max_rps: 2
  budget_per_min: 60
