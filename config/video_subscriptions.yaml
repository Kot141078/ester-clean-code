# config/video_subscriptions.yaml
# List of sources for proactive video processing.
# Safe defaults: everything is off; turn on pointwise.
#
# Polya:
# - id: unikalnyy identifikator podpiski
# - enabled: 0/1
# - kind: rss | direct | ytsearch
# - URL: RSS feed or direct URL (for kind=rss|direct)
# - cuers: YouTube search bar (for kind=otsearch); used from-dlp format "searchn:<queries>"
# - limit: max. number of new elements per run (default 3)
# - tags: arbitrary tags for memory/accounting
#
# Mosty:
# - Yavnyy: (Infoteoriya ↔ Kibernetika) yavnoe opisanie istochnikov snizhaet entropiyu zapuska i upravlyaet nagruzkoy.
# - Skrytyy #1: (Bayes ↔ Memory) id/data poslednego elementa dayut apriori dlya deduplikatsii i prirosta znaniy.
# - Skrytyy #2: (Logika ↔ Planirovschik) vklyuchenie/vyklyuchenie podpisok — ruchka upravleniya avtomatikoy.
#
# Zemnoy abzats:
# This is the “layout of input pipes” at the plant: each pipe is a raw material supply belt (video). Valves (enabled) regulate the flow.
#
# c=a+b

subscriptions:
  - id: yt-rss-openai
    enabled: 0
    kind: rss
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCxzC4EngIsMrPmbm6Nxvb-A"
    limit: 3
    tags: ["video","tech","yt"]

  - id: ytsearch-rag
    enabled: 0
    kind: ytsearch
    query: "RAG retrieval augmented generation tutorial"
    limit: 2
    tags: ["video","rag","search"]

  - id: direct-demo
    enabled: 0
    kind: direct
    url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    limit: 1
    tags: ["video","demo"]
