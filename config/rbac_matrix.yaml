# -*- coding: utf-8 -*-
# Default RVA matrix policy.
# If the application supports reading from config/rach_matrix.yaml, this matrix will give strict rules for critical handles.
# Roli:
#   admin — polnyy dostup
#   ops — operatsii /ops/*
#   provider_manager — vybor provaydera /providers/select
#   ingest — operatsii zagruzki /ingest/*

roles:
  admin:
    allow:
      - "*"
  ops:
    allow:
      - "/ops/*"
  provider_manager:
    allow:
      - "/providers/select"
  ingest:
    allow:
      - "/ingest/*"

rules:
  "/ops/*":
    require_any_role: ["admin", "ops"]
  "/providers/select":
    require_any_role: ["admin", "provider_manager"]
  "/ingest/*":
    require_any_role: ["admin", "ingest"]
