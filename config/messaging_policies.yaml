# config/messaging_policies.yaml — politiki perepiski i proaktivnosti
# MOSTY:
# - (Explicit) Frequency threshold and default opt-in.
# - (Hidden #1) Start greetings in any channel.
# - (Hidden #2) Tone profiles (stealth), switchable ENV.

optin_required: true
proactive_rate_per_h: 6
welcome:
  - "Rada podklyuchitsya. Napishite, chem zanyatsya v pervuyu ochered."
  - "Gotova pomoch. Sformuliruyte zadachu odnim predlozheniem."
persona: gentle
