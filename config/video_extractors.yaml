# config/video_extractors.yaml - parameters of the universal video pipeline (optional).
# If the file is missing, ENV and built-in defaults are used.
#
# Parametry:
#   ab_slot: A | B
#   prefer_lang: 'ru'
#   asr_model: 'base'
#
# Mosty:
# - Yavnyy: (Inzheneriya ↔ Ekspluatatsiya) edinyy konfig bez pravki koda.
# - Skrytyy #1: (Kibernetika ↔ Volya) svyazka s RuleHub (pereklyuchenie slotov/yazyka).
# - Skrytyy #2: (Memory ↔ Video) soglasovanie normalizatsii subtitrov i yazyka.

ab_slot: B
prefer_lang: 'ru'
asr_model: 'base'

# Earthly paragraph: this is the “label on the remote control” - which slot is turned on and in what language we expect subtitles.

# c=a+b
