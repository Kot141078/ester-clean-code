# config/newges.yaml - rules for generating news + escalation.
# MOSTY:
# - (Explicit) rules by event types, intent_tpl and intent_tpl_escalation, slal_soon_min.
# - (Hidden #1) Escalations are activated at the steps of the SLA chain with m<0 (overdue) and are sent to tags from the ENV ёNIDGES_ESKALATE_TAGSje.
# - (Hidden #2) If ENV is not specified, you can explicitly write tags in rules.<Event>.escalate_tags.

rules:
  AssignmentPlanned:
    kind: friend
    sla_soon_min: 120
    intent_tpl: "Napominayu pro zadachu «{summary}». Dedlayn cherez ~{mins} min. Vse ok?"
    intent_tpl_escalation: "Prosrochka po «{summary}» ~{mins_over} min. Nuzhna pomosch dlya razblokirovki."
    escalate_tags: ["manager"]
  OutcomeReported:
    kind: neutral
    intent_tpl: "Spasibo za rezultat po «{summary}». Korotko: {outcome}. Nuzhen post-mortem?"
  AssignmentRequested:
    kind: neutral
    intent_tpl: "Prinyal zapros «{summary}». Vernus s planom v blizhayshee vremya."

# Example of a custom event with its own escalation:
  CustomIncident:
    kind: lawyer
    intent_tpl: "Intsident: {summary}. Nuzhna otsenka riskov i plan sderzhivaniya."
    intent_tpl_escalation: "Intsident vse esche aktiven: {summary}. Nuzhna eskalatsiya."
    escalate_tags: ["oncall","manager"]
