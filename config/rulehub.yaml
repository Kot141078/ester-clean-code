# rulehub.yaml — politika prioritetov i kvot (bezopasnye defolty).
# Note: quota=0 means "no limit".
# You can expand the list of actions: summary, classify, http_post, search, plan, reflect, index, notification, ...
priorities:
  summarize: 10
  classify: 8
  plan: 7
  http_post: 6
  search: 6
  reflect: 5
  index: 4
  notify: 3

quotas_per_min:
  summarize: 0
  classify: 0
  plan: 0
  http_post: 30
  search: 15
  reflect: 10
  index: 20
  notify: 30

