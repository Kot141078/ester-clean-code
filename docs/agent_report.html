<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester — Report Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{ --bg:#0b0c10; --fg:#e5e7eb; --accent:#60a5fa; --muted:#9ca3af; --border:#374151; }
    body{ background:var(--bg); color:var(--fg); font:14px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; }
    .wrap{ max-width:1100px; margin:0 auto; padding:20px; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .card{ border:1px solid var(--border); border-radius:10px; padding:14px; background:#0f1115; }
    input,button,select,textarea{ width:100%; box-sizing:border-box; }
    input,select{ background:#0f1115; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:8px; }
    textarea{ min-height:120px; background:#0f1115; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:8px; }
    button{ background:#1f2937; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; }
    button:hover{ filter:brightness(1.08) }
    pre{ white-space:pre-wrap; word-break:break-word; border:1px solid var(--border); border-radius:8px; padding:10px; background:#0b0e14; }
    .row{ display:flex; gap:8px; align-items:center; }
    .row>*{ flex:1; }
    .muted{ color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <!--
    Mosty:
    - Yavnyy: (UX ↔ Mysli/Kaskad) — dergaem /thinking/act i /thinking/cascade/execute.
    - Skrytyy #1: (UX ↔ Avtorizatsiya) — JWT kak v obschey adminke (static/admin.js).
    - Skrytyy #2: (UX ↔ RuleHub) — status rules vyvoditsya spravochno.

    Zemnoy abzats:
    Pult otchetov: sobrat MD/HTML iz brifa/cheklistov/metrik i (esli razresheno) sokhranit kak fayly. Nikakikh novykh API.
    c=a+b
  -->
  <div class="wrap">
    <h1>Report Console</h1>
    <p class="muted">Rabotaet poverkh suschestvuyuschikh API: <code>/thinking/act</code>, <code>/thinking/cascade/*</code>. JWT — obschiy, kak v adminke.</p>

    <div class="card">
      <h3>JWT</h3>
      <div class="row">
        <input id="jwtInput" placeholder="JWT">
        <button id="saveJwtBtn">Save</button>
        <button id="clearJwtBtn">Ochistit</button>
      </div>
      <div class="grid" style="margin-top:12px;">
        <div class="card">
          <h4>Okruzhenie</h4>
          <button id="btnEnv">Proverit okruzhenie</button>
          <pre id="state" class="muted">{}</pre>
        </div>
        <div class="card">
          <h4>RuleHub (status)</h4>
          <pre id="rulehub" class="muted">{}</pre>
        </div>
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h3>Iskhodnye dannye</h3>
        <input id="title" placeholder="Nazvanie otcheta (napr. Eko-otchet: Q4)">
        <input id="goal" placeholder="Tsel (napr. snizit CO₂e na 30% za 12 mes)">
        <div class="row">
          <button id="btnList">Spisok cheklistov</button>
          <select id="checklistId"></select>
          <button id="btnGet">Pokazat cheklist</button>
        </div>
        <button id="btnBrief">Sobrat brif (iz Sustainability Kit)</button>
      </div>

      <div class="card">
        <h3>Dannye (redaktiruemye)</h3>
        <textarea id="brief" placeholder='{"outline":[...],"hints":{...}}'></textarea>
        <textarea id="checklistMd" placeholder="# Cheklist..."></textarea>
        <textarea id="metrics" placeholder='{"units":"kgCO2e","electricity":{"grid_generic_kg_per_kwh":0.4}}'></textarea>
      </div>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h3>Sborka otcheta</h3>
        <div class="row">
          <button id="btnMD">Sobrat MD-otchet</button>
          <button id="btnHTML">Sobrat HTML</button>
          <button id="btnSave">Save fayly</button>
        </div>
        <textarea id="md" placeholder="# ..."></textarea>
        <textarea id="html" placeholder="<!doctype html>..."></textarea>
      </div>
      <div class="card">
        <h3>Mini-plan</h3>
        <div class="row">
          <button id="btnPlan">Sformirovat mini-plan</button>
          <button id="btnExec">Vypolnit plan</button>
        </div>
        <textarea id="plan" placeholder='{"ok":true,"goal":"...","steps":[...]}'></textarea>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Vyvod</h3>
      <pre id="out">{}</pre>
      <h3>Log</h3>
      <pre id="log"></pre>
    </div>
  </div>

  <script src="../static/admin.js"></script>
  <script src="../static/admin_report_export.js"></script>
</body>
</html>
<!-- c=a+b -->
