<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Esther - Autonomy (green goals)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{ --bg:#0b0c10; --fg:#e5e7eb; --muted:#9ca3af; --border:#374151; --accent:#22c55e; }
    body{ background:var(--bg); color:var(--fg); font:14px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:0; }
    .wrap{ max-width:1100px; margin:0 auto; padding:20px; }
    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .card{ border:1px solid var(--border); border-radius:10px; padding:14px; background:#0f1115; }
    input,button,select,textarea{ width:100%; box-sizing:border-box; }
    input{ background:#0f1115; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:8px; }
    textarea{ min-height:140px; background:#0f1115; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:8px; }
    button{ background:#1f2937; color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; }
    button:hover{ filter:brightness(1.08) }
    pre{ white-space:pre-wrap; word-break:break-word; border:1px solid var(--border); border-radius:8px; padding:10px; background:#0b0e14; }
    .row{ display:flex; gap:8px; align-items:center; }
    .row>*{ flex:1; }
    .muted{ color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <!--
    Mosty:
    - Yavnyy: (UX ↔ Mysli/Kaskad) — autonomy.green.* cherez /thinking/act i zapusk cherez /thinking/cascade/execute.
    - Skrytyy #1: (UX ↔ Builder/Kit/Report) — plan ssylaetsya na suschestvuyuschie deystviya, kontrakty prezhnie.
    - Skrytyy #2: (UX ↔ Avtorizatsiya) — JWT iz static/admin.js.

    Zemnoy abzats:
    Zdes Ester sama predlagaet zelenye tseli. Vy upravlyaete tolko puskom — vse ostalnoe sobiraetsya avtomaticheski v znakomykh kontraktakh.
    c=a+b
  -->
  <div class="wrap">
    <h1>Autonomy: green goals</h1>
    <p class="muted">Works on top <code>/thinking/act</code> i <code>/thinking/cascade/*</code>. ZhVT - general (as in the admin panel).</p>

    <div class="card">
      <h3>Okruzhenie</h3>
      <div class="row">
        <input id="jwtInput" placeholder="JWT">
        <button id="saveJwtBtn">Save</button>
        <button id="clearJwtBtn">Ochistit</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="btnEnv">Check environment</button>
      </div>
      <pre id="state" class="muted">{}</pre>
    </div>

    <div class="grid" style="margin-top:16px;">
      <div class="card">
        <h3>Tseli</h3>
        <div class="row">
          <input id="maxn" placeholder="How many targets (default 1)" value="1">
          <button id="btnSuggest">Suggest goals</button>
        </div>
        <textarea id="goals" placeholder='[{"rank":1,"goal":"...","score":1.0}]'></textarea>
      </div>
      <div class="card">
        <h3>Plan</h3>
        <div class="row">
          <button id="btnPlan">Sformirovat plan</button>
          <button id="btnPlanBatch">Sformirovat plan (po spisku tseley)</button>
          <button id="btnExec">Vypolnit plan</button>
        </div>
        <textarea id="plan" placeholder='{"ok":true,"steps":[...]}'></textarea>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Vyvod</h3>
      <pre id="out">{}</pre>
      <h3>Log</h3>
      <pre id="log"></pre>
    </div>
  </div>

  <script src="../static/admin.js"></script>
  <script src="../static/admin_auto_green.js"></script>
</body>
</html>
<!-- c=a+b -->
