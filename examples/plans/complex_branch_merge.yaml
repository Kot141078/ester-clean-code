run_id: research_run_12
branch_id: main
context_init:
  spec: "Sobrat analiz po trem dokumentam, zatem slit v obschiy otchet."
  items:
    - {file: "rpt_A.md"}
    - {file: "rpt_B.md"}
    - {file: "rpt_C.md"}

nodes:
  - id: outline
    type: llm.generate
    prompt: "Kratko oboznach tseli analiza: {{ctx.spec}}. Do 5 punktov."
    out: "outline"
    depends: []

  - id: fork
    type: fanout
    items: "{{ctx.items}}"
    depends: ["outline"]

  - id: analyze
    type: llm.generate
    prompt: "Analiz {{ctx.item.file}} s uchetom tseley: {{ctx.outline}}. Verni 3–5 predlozheniy."
    out: "analysis"
    depends: ["fork"]

  - id: polish
    type: llm.generate
    prompt: "Sozhmi i otpoliruy analiz {{ctx.item.file}}: {{ctx.analysis}}"
    out: "final_branch"
    depends: ["analyze"]

  # Sbor vsekh vetok v spisok strok
  - id: gather
    type: join
    from: "fork"
    out: "joined_list"
    select:
      file: "{{item.file}}"
      text: "{{ctx.final_branch}}"
    mode: list
    await_nodes: ["polish"]
    depends: ["polish"]

  # Final report on the root branch based on the ein result
  - id: final_report
    type: llm.generate
    prompt: "Sformiruy obschiy otchet po elementam={{ctx.joined_list}}. Kratko rezyumiruy po kazhdomu i day obschiy vyvod."
    out: "report"
    depends: ["gather"]
