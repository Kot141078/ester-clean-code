# Daydzhest aktivnosti (LLM-skleyka zametok)
# Mosty:
# - Yavnyy: (LLM/Plan ↔ Dannye) — ispolzuem sobytiya, otobrannye actions_agent_activity, i formiruem svodku.
# - Skrytyy #1: (Memory ↔ Plan) — fiksiruem start v profilee.
# - Skrytyy #2: (UX ↔ Kaskad) — zapuskaetsya temi zhe ruchkami /thinking/cascade/execute (sovmestimo s adminkoy kaskada).

run_id: activity_digest
branch_id: main
context_init:
  spec: "Svesti aktivnost Builder/KIT/Report v kratkiy MD-daydzhest."
  items:
    - {file: "digest.md"}

nodes:
  - id: outline
    type: llm.generate
    prompt: |
      Na osnove predostavlennykh sobytiy sformiruy MD-daydzhest: khronologiya, klyuchevye deystviya, TODO.
      Korotko i strukturirovano.
    out: "outline"
    depends: []

  - id: passport
    type: script
    update:
      passport_note: "DIGEST: start generatsii"
    depends: ["outline"]

  - id: fanout
    type: fanout
    items: "{{ctx.items}}"
    depends: ["passport"]

  - id: draft
    type: llm.generate
    prompt: |
      Podgotov {{ctx.item.file}} na osnove outline={{ctx.outline}}.
      Dobav blok «Sleduyuschie shagi».
    out: "branch_out"
    depends: ["fanout"]

  - id: join
    type: join
    from: "fanout"
    out: "scaffold"
    select:
      file: "{{item.file}}"
      text: "{{ctx.branch_out}}"
    mode: list
    await_nodes: ["draft"]
    depends: ["draft"]
# c=a+b
