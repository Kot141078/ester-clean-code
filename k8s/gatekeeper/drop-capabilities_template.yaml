apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata: { name: k8sdropcaps }
spec:
  crd:
    spec:
      names: { kind: K8sDropCaps }
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sdropcaps
      violation[{"msg": "containers must drop ALL capabilities"}] {
        c := input.review.object.spec.template.spec.containers[_]
        not c.securityContext.capabilities.drop
        or not contains(c.securityContext.capabilities.drop, "ALL")
      }
