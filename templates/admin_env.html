<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — ENV-panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,textarea{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px;cursor:pointer}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .muted{opacity:.7}
    table{width:100%;border-collapse:collapse}
    td,th{border-bottom:1px solid #273244;padding:6px;text-align:left;font-size:13px}
    .k{font-weight:700}
    code{background:#0b121d;padding:2px 6px;border-radius:6px}
  </style>
  <!--
    Zemnoy abzats:
      Panel dlya offlayn-importa recommend.env, diffa s tekuschim okruzheniem i zapisi active.env na USB.
    Mosty: yavnyy — /recommend, /preview, /apply; skrytye — offlayn/AB-guard, stdlib.
  -->
</head>
<body>
  <h1>ENV-panel <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section>
    <h3>Iskhodnyy tekst (.env)</h3>
    <div style="margin-bottom:8px">
      <button onclick="loadRecommend()">Zagruzit recommend.env s USB</button>
      <button onclick="previewDiff()">Predprosmotr</button>
      <button onclick="applyActive()">Zapisat active.env</button>
      <span id="res" class="chip">—</span>
    </div>
    <textarea id="envtext" placeholder="KEY=VALUE\n..." style="width:100%;min-height:160px"></textarea>
  </section>

  <section>
    <h3>Diff (tekuschee ↔ predlagaemoe)</h3>
    <div id="diff">—</div>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function jget(u,opts){ const r=await fetch(u,opts); return await r.json().catch(()=>({ok:false})); }
function esc(s){return (s??"").toString().replace(/</g,"&lt;")}
function diffView(d){
  if(!d) return "—";
  let h="";
  const same=d.same||[];
  const changed=d.changed||[];
  const neu=d.new||[];
  if(changed.length===0 && neu.length===0) h+="<p class='muted'>Izmeneniy net — vse sovpadaet.</p>";
  if(changed.length){
    h+="<b>Izmenyatsya:</b><table><tr><th>KEY</th><th>tekuschee</th><th>predlagaemoe</th></tr>";
    for(const it of changed){
      h+=`<tr><td class="k">${esc(it.key)}</td><td><code>${esc(it.current)}</code></td><td><code>${esc(it.proposed)}</code></td></tr>`;
    }
    h+="</table>";
  }
  if(neu.length){
    h+="<b>Novye:</b><table><tr><th>KEY</th><th>znachenie</th></tr>";
    for(const it of neu){
      h+=`<tr><td class="k">${esc(it.key)}</td><td><code>${esc(it.proposed)}</code></td></tr>`;
    }
    h+="</table>";
  }
  if(same.length){
    h+=`<div class="muted">Sovpadayut: ${same.map(esc).join(", ")}</div>`;
  }
  return h || "—";
}
async function loadRecommend(){
  const j = await jget('/admin/env/recommend');
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
  if(j.ok && j.text){ document.getElementById('envtext').value = j.text; }
}
async function previewDiff(){
  const text = document.getElementById('envtext').value||"";
  const j = await jget('/admin/env/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
  document.getElementById('diff').innerHTML = diffView(j.diff);
}
async function applyActive(){
  // Before recording, let’s recalculate with a couple of calls: get the diff and collect the vars from the source text
  const text = document.getElementById('envtext').value||"";
  const pr = await jget('/admin/env/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  const vars = {};
  // From the source text we take all the keys -> values ​​(parse the server in the same way)
  // In order not to pull the parser into the client, we simply ask the server to write down the resulting set:
  const j = await jget('/admin/env/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vars: (pr.ok && pr.diff ? Object.fromEntries((pr.diff.new||[]).map(x=>[x.key,x.proposed]).concat((pr.diff.changed||[]).map(x=>[x.key,x.proposed]))) : {})})});
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
  document.getElementById('res').textContent = j.ok ? "OK" : "ERR";
}
</script>
</body>
</html>
