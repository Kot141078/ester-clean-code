<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Transport uzlov</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,textarea{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{border-bottom:1px solid #243042;padding:8px 6px;text-align:left;vertical-align:top}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .muted{color:#9aa9bd}.ok{color:#9BE28D}.err{color:#ff8a8a}.warn{color:#f5c542}
    .mono{font-family:ui-monospace,Consolas,monospace}
    pre{white-space:pre-wrap}
    textarea{min-width:340px;min-height:80px}
  </style>
</head>
<body>
  <h1>Transport uzlov</h1>

  <section>
    <div class="row">
      <button onclick="loadPeers()">Obnovit</button>
      <span id="flag" class="chip muted">–</span>
      <span class="muted">AB_MODE: <b id="ab">{{ ab }}</b></span>
    </div>
    <table id="tbl"><thead><tr><th>Uzel</th><th>BASE</th><th>Posledniy raz</th><th>Kanal</th><th>Ping</th></tr></thead><tbody></tbody></table>
  </section>

  <section>
    <div class="row">
      <select id="mode">
        <option value="lan">LAN</option>
        <option value="telegram">Telegram</option>
      </select>
      <textarea id="payload" placeholder='{"msg":"privet"}'></textarea>
      <button onclick="sendMsg()">Test-soobschenie</button>
      <span class="chip muted">Rezhim B vklyuchaet otpravku</span>
    </div>
    <pre id="out" class="mono">—</pre>
  </section>

<script>
async function loadPeers(){
  const r = await fetch('/admin/transport/peers');
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  document.getElementById('flag').textContent = j.ok?'OK':'ERR';
  document.getElementById('flag').className='chip ' + (j.ok?'ok':'err');
  const tb = document.querySelector('#tbl tbody'); tb.innerHTML='';
  if(!j.ok){ tb.innerHTML = `<tr><td colspan="5" class="err">${j.error||'error'}</td></tr>`; return; }
  const peers = j.peers||[];
  const http = j.http||[];
  const map = {}; http.forEach(h=>map[h.base_url]=h);
  peers.forEach(p=>{
    const base = p.base_url||'-';
    const h = map[base]||{};
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono">${p.node_id}</td>
      <td class="mono">${base}</td>
      <td>${new Date((p.last_seen||0)*1000).toLocaleString()}</td>
      <td>${p.via}</td>
      <td>
        <button data-b="${base}">Ping</button>
        <span class="${h.ok?'ok':(h.ok===false?'err':'muted')}">${h.ok?'OK':(h.ok===false?'ERR':'—')}</span>
      </td>`;
    tr.querySelector('button').onclick = ()=>ping(base);
    tb.appendChild(tr);
  });
}

async function ping(base){
  const fd = new FormData(); fd.append('base', base);
  const r = await fetch('/admin/transport/ping', {method:'POST', body: fd});
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}

async function sendMsg(){
  const fd = new FormData();
  fd.append('mode', document.getElementById('mode').value);
  fd.append('payload', document.getElementById('payload').value);
  const r = await fetch('/admin/transport/testmsg', {method:'POST', body: fd});
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}

// init
loadPeers().catch(()=>{});
</script>
</body>
</html>
