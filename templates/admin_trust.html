<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Trust</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;color:#111}
    input,button{padding:8px 12px;border:1px solid #ddd;border-radius:10px}
    .row{display:flex;gap:12px;margin:12px 0}
    pre{background:#f7f7f7;padding:10px;border-radius:10px;max-height:50vh;overflow:auto}
  </style>
</head>
<body>
  <h1>Trust Index</h1>
  <div class="row">
    <input id="id" placeholder="fact id (key)"/>
    <input id="delta" type="number" step="0.1" value="1"/>
    <input id="src" placeholder="source" value="user"/>
    <label><input id="sign" type="checkbox"/> podpisat</label>
    <button onclick="upd()">Δ</button>
    <button onclick="get()">Get</button>
    <button onclick="lst()">List</button>
    <button onclick="ver()">Verify</button>
  </div>
  <pre id="out">—</pre>

<script>
async function upd(){
  const r = await fetch('/trust/update',{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      id: document.getElementById('id').value,
      delta: parseFloat(document.getElementById('delta').value||'0'),
      source: document.getElementById('src').value,
      sign: document.getElementById('sign').checked
    })});
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
async function get(){
  const id=document.getElementById('id').value;
  const r=await fetch('/trust/get?id='+encodeURIComponent(id));
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
async function lst(){
  const r=await fetch('/trust/list?limit=50');
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
async function ver(){
  const id=document.getElementById('id').value;
  const r=await fetch('/trust/verify?id='+encodeURIComponent(id));
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
</script>
</body>
</html>
