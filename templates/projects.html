<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Esther – Projects of thinking problems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,textarea,select{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #243042;padding:8px 6px;text-align:left;vertical-align:top}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    textarea{width:100%;min-height:140px}
  </style>
  <!--
    Zemnoy abzats:
      Odin ekran dlya proektov: sozdat, dobavit zadaniya, prognat batch, vygruzit rezultaty na fleshku (ESTER/exports/...).
    Mosty:
      • Yavnyy — UX-upravlenie ocheredyu myshleniya.
      • Skrytye — AB-aware rezhimy i ploskie JSON-sostoyaniya (audit/perenosimost).
  -->
</head>
<body>
  <h1>Proekty <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section class="grid">
    <div>
      <h3>Sozdat proekt</h3>
      <input id="pname" placeholder="Nazvanie proekta"/>
      <div style="margin-top:8px">
        <label>min_ctx <input id="d_ctx" type="number" value="4096" style="width:120px"/></label>
        <label>min_tok/s <input id="d_tok" type="number" step="0.1" value="2" style="width:120px"/></label>
        <label>alias (opts.) <input id="d_alias" placeholder="predpocht. resurs"/></label>
      </div>
      <button onclick="create()">Sozdat</button>
    </div>
    <div>
      <h3>Inboks (drop-folder)</h3>
      <div id="inbox">—</div>
      <div class="muted">Polozhite *.txt (po stroke na zadanie) ili *.json ({"name":..., "jobs":[...]})</div>
    </div>
    <div>
      <h3>Toma (USB)</h3>
      <select id="mount"></select>
      <button onclick="refresh()">Obnovit</button>
    </div>
  </section>

  <section>
    <h3>Spisok proektov</h3>
    <table id="tbl"><thead><tr><th>ID</th><th>Imya</th><th>Vsego</th><th>Gotovo</th><th>Ozhidaet</th><th></th></tr></thead><tbody></tbody></table>
  </section>

  <section>
    <h3>Detali proekta</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="pid" placeholder="project_id" style="min-width:260px"/>
      <button onclick="load()">Zagruzit</button>
      <button onclick="run('pending')">Progon pending</button>
      <button onclick="run('all')">Progon all</button>
      <button onclick="exportProj()">Eksport na fleshku</button>
    </div>
    <div class="grid" style="margin-top:12px">
      <div>
        <h4>Dobavit zadaniya</h4>
        <textarea id="prompts" placeholder="po stroke na zadanie..."></textarea>
        <div style="margin-top:6px">
          <label>alias (opts.) <input id="alias" placeholder="perekryt po umolchaniyu"/></label>
          <label>max_tokens <input id="maxtok" type="number" value="64" style="width:120px"/></label>
          <label>T <input id="temp" type="number" step="0.1" value="0.0" style="width:100px"/></label>
        </div>
        <button onclick="addJobs()">Dobavit</button>
      </div>
      <div>
        <h4>Proekt</h4>
        <pre id="detail">—</pre>
      </div>
    </div>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function refresh(){
  const r = await fetch('/admin/projects/status'); const j = await r.json().catch(()=>({ok:false}));
  if(!j.ok) return;
  document.getElementById('inbox').textContent = j.inbox_path||'—';
  const m=document.getElementById('mount'); m.innerHTML='';
  (j.usb||[]).forEach(t=>{
    const o=document.createElement('option'); o.value=t.mount; o.textContent=(t.mount+' — '+(t.label||'')+' ('+(t.fs||'?')+')');
    m.appendChild(o);
  });
  const tb=document.querySelector('#tbl tbody'); tb.innerHTML='';
  (j.projects?.items||[]).forEach(p=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `<td>${p.id}</td><td>${p.name}</td><td>${p.jobs_total}</td><td>${p.jobs_done}</td><td>${p.jobs_pending}</td>
      <td><button onclick="sel('${p.id}')">Vybrat</button></td>`;
    tb.appendChild(tr);
  });
  document.getElementById('raw').textContent = JSON.stringify(j,null,2);
}
function sel(pid){ document.getElementById('pid').value = pid; load(); }
async function create(){
  const name=document.getElementById('pname').value.trim();
  const defaults = { req: { min_ctx: parseInt(document.getElementById('d_ctx').value,10)||4096, min_tokps: parseFloat(document.getElementById('d_tok').value)||2 }, alias: document.getElementById('d_alias').value.trim() };
  const r = await fetch('/admin/projects/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, defaults})});
  await refresh();
}
async function load(){
  const pid=document.getElementById('pid').value.trim(); if(!pid) return;
  const r = await fetch('/admin/projects/detail?id='+encodeURIComponent(pid)); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('detail').textContent = JSON.stringify(j,null,2);
}
async function addJobs(){
  const pid=document.getElementById('pid').value.trim(); if(!pid) return;
  const lines=(document.getElementById('prompts').value||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const alias=document.getElementById('alias').value.trim();
  const maxtok=parseInt(document.getElementById('maxtok').value,10)||64;
  const temp=parseFloat(document.getElementById('temp').value)||0.0;
  const items = lines.map(p=>({prompt:p, alias: alias||null, max_tokens: maxtok, temperature: temp}));
  const r = await fetch('/admin/projects/add_jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid, items})});
  await load(); await refresh();
}
async function run(mode){
  const pid=document.getElementById('pid').value.trim(); if(!pid) return;
  const r = await fetch('/admin/projects/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid, mode})});
  const j = await r.json().catch(()=>({ok:false}));
  alert(JSON.stringify(j));
  await load(); await refresh();
}
async function exportProj(){
  const pid=document.getElementById('pid').value.trim(); if(!pid) return;
  const mount=document.getElementById('mount').value;
  const r = await fetch('/admin/projects/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:pid, mount})});
  const j = await r.json().catch(()=>({ok:false}));
  alert(JSON.stringify(j));
}
refresh().catch(()=>{});
</script>
</body>
</html>
