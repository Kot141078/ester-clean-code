<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Katalog uzlov</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,select,textarea{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    code{background:#0b121d;padding:2px 6px;border-radius:6px}
    table{width:100%;border-collapse:collapse}
    td,th{border-bottom:1px solid #273244;padding:6px;text-align:left;font-size:13px}
    .muted{opacity:.7}
  </style>
  <!--
    Zemnoy abzats:
      Uchet uzlov: svoya kartochka, spisok izvestnykh, knopka publikatsii i import s USB; podskazka ispolnitelya.
    Mosty:
      • Yavnyy — UX nad capabilities/registry/selector.
      • Skrytye — AB-predokhranitel; offlayn; JSON-statusy.
  -->
</head>
<body>
  <h1>Katalog uzlov <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section class="grid">
    <div>
      <h3>Svoya kartochka</h3>
      <button onclick="refresh()">Obnovit</button>
      <button onclick="publish()">Opublikovat seychas</button>
      <button onclick="importUSB()">Import s USB</button>
      <pre id="self">—</pre>
    </div>
    <div>
      <h3>Uzly</h3>
      <div id="nodes">—</div>
    </div>
    <div>
      <h3>Podskazka dlya gibridnoy ocheredi</h3>
      <div class="row">
        <select id="job">
          <option value="proj_build_publish">proj_build_publish</option>
          <option value="build_ticket">build_ticket</option>
        </select>
      </div>
      <textarea id="jargs" style="width:100%;min-height:80px" placeholder='{"project_dir":"/path/on/remote","publish":true}'></textarea>
      <button onclick="suggest()">Podskazat tseli</button>
      <pre id="suggest">—</pre>
    </div>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
function esc(s){return (s||"").toString().replace(/</g,"&lt;")}
function table(items){
  if(!items || !items.items || !items.items.length) return "<p class='muted'>Poka pusto</p>";
  let h="<table><tr><th>node_id</th><th>class</th><th>mem</th><th>GPU</th><th>aliases</th></tr>";
  for(const it of items.items){
    const cls = it?.hw?.class || "-";
    const mem = it?.hw?.mem_gb || "-";
    const gpu = (it?.hw?.gpu||[]).map(g=>g.name+(g.vram_gb?`/${g.vram_gb}GB`:"")).join(", ");
    const al  = Object.keys(it?.lmstudio?.aliases||{}).join(", ");
    h+=`<tr><td><code>${esc(it.node_id||"-")}</code></td><td>${esc(cls)}</td><td>${esc(mem)}</td><td>${esc(gpu)}</td><td>${esc(al)}</td></tr>`;
  }
  h+="</table>";
  return h;
}
async function refresh(){
  const r = await fetch('/admin/registry/status'); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('self').textContent = JSON.stringify(j.self, null, 2);
  document.getElementById('nodes').innerHTML = table(j.nodes||{items:[]});
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
}
async function publish(){
  const r = await fetch('/admin/registry/publish_now',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  await refresh();
}
async function importUSB(){
  const r = await fetch('/admin/registry/import_usb',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  await refresh();
}
async function suggest(){
  let args = {}; try{ args = JSON.parse(document.getElementById('jargs').value||'{}'); }catch(e){ alert('Plokhoy JSON v args'); return; }
  const r = await fetch('/admin/registry/suggest_targets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_type:document.getElementById('job').value,args})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('suggest').textContent = JSON.stringify(j, null, 2);
}
refresh().catch(()=>{});
</script>
</body>
</html>
