<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Judge A/B podskazki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:10px 14px}
    button:hover{filter:brightness(1.1)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .muted{color:#9aa9bd}.ok{color:#9BE28D}.err{color:#ff8a8a}
  </style>
</head>
<body>
  <h1>Judge A/B — podskazki</h1>

  <section>
    <div class="row">
      <button onclick="loadSugg()">Poluchit podskazki</button>
      <label><input type="checkbox" id="bench" checked> Korotkiy bench</label>
      <button onclick="applySugg()">Primenit (zapisat overlay)</button>
      <input id="out" class="mono" placeholder="~/.ester/judge_slots.json" style="min-width:360px"/>
      <span id="flag" class="chip muted">–</span>
    </div>
  </section>

  <section>
    <h3>Podskazki (JSON)</h3>
    <pre id="json">—</pre>
  </section>

<script>
function val(id){return document.getElementById(id).value}
function checked(id){return document.getElementById(id).checked}

async function loadSugg(){
  const bench = checked('bench')?'1':'0';
  const r = await fetch('/admin/judge/ab/suggest?bench='+bench);
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  document.getElementById('json').textContent = JSON.stringify(j, null, 2);
  document.getElementById('flag').textContent = j.ok?'OK':'ERR';
  document.getElementById('flag').className = 'chip ' + (j.ok?'ok':'err');
  if(j.ok){ document.getElementById('out').placeholder = (j.suggestion_saved_to||'~/.ester/judge_slots.json'); }
}

async function applySugg(){
  const fd = new FormData();
  if(checked('bench')) fd.append('bench','1');
  const out = val('out').trim(); if(out) fd.append('out', out);
  const r = await fetch('/admin/judge/ab/apply', {method:'POST', body: fd});
  const j = await r.json().catch(()=>({ok:false,error:'bad json'}));
  document.getElementById('json').textContent = JSON.stringify(j, null, 2);
  document.getElementById('flag').textContent = j.ok?'SAVED':'ERR';
  document.getElementById('flag').className = 'chip ' + (j.ok?'ok':'err');
}

// init
loadSugg().catch(()=>{});
</script>
</body>
</html>
