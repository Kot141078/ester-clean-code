{% extends "_admin_base.html" %}
{% block content %}

<section class="card" style="margin-bottom:12px">
  <div class="row" style="gap:10px;align-items:center;flex-wrap:wrap">
    <h2 style="margin:0">Zagruzka faylov</h2>
    <span class="chip">POST /ingest/file</span>
    <div class="spacer"></div>
    <a class="navlink" href="/portal">← Nazad v /portal</a>
  </div>
</section>

<section class="card" style="margin-bottom:12px">
  <div class="row" style="gap:10px;align-items:center;margin-bottom:10px">
    <input id="pCollection" class="input" style="min-width:240px" placeholder="collection (opts.)">
    <input id="pMeta" class="input" style="min-width:320px" placeholder='meta JSON (opts.), naprimer: {"source":"portal"}'>
    <div class="spacer"></div>
    <button class="btn" onclick="flushQueue()">Ochistit spisok</button>
  </div>

  <div id="drop" class="drop box">
    Peretaschi fayly syuda ili
    <label class="btn" style="margin-left:6px;cursor:pointer">
      vybrat<input id="file" type="file" multiple style="display:none">
    </label>
    <div class="notice" style="margin-top:8px">Podderzhivaetsya paketnaya zagruzka. Progress — po kazhdomu faylu.</div>

    <div class="filelist" id="list" style="margin-top:10px"></div>
  </div>
</section>

<section class="card">
  <div class="row" style="gap:8px;align-items:center;margin-bottom:8px">
    <h3 style="margin:0">Poslednie zagruzki (best-effort)</h3>
    <button class="btn" onclick="loadIngests()">Obnovit</button>
    <div class="spacer"></div>
    <button class="btn" onclick="openNew('/routes')">/routes</button>
    <button class="btn" onclick="openNew('/docs')">Swagger</button>
    <button class="btn" onclick="openNew('/openapi.json')">OpenAPI</button>
  </div>
  <div class="box" style="overflow:auto;max-height:360px">
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">ID/Imya</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Kollektsiya</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Razmer</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Sozdano</th>
          <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Status</th>
        </tr>
      </thead>
      <tbody id="ingBody"></tbody>
    </table>
  </div>
</section>

<script>
  const elDrop = document.getElementById('drop');
  const elFile = document.getElementById('file');
  const elList = document.getElementById('list');

  ;['dragenter','dragover'].forEach(ev => elDrop.addEventListener(ev, e=>{e.preventDefault();e.stopPropagation();elDrop.classList.add('drag')} ));
  ;['dragleave','drop'].forEach(ev => elDrop.addEventListener(ev, e=>{e.preventDefault();e.stopPropagation();elDrop.classList.remove('drag')} ));
  elDrop.addEventListener('drop', e => { const f=e.dataTransfer.files; if(f&&f.length) handleFiles(f); });
  elFile.addEventListener('change', e => { if(elFile.files) handleFiles(elFile.files); });

  function flushQueue(){ elList.innerHTML=''; }

  function metaFromInput(){
    const raw=(document.getElementById('pMeta').value||'').trim();
    if(!raw) return null;
    try{ return JSON.parse(raw); }catch(_){ return raw; }
  }

  function rowForFile(name){
    const row=document.createElement('div');
    row.style.padding='6px 0';
    const title=document.createElement('div');
    title.textContent='→ '+name;
    const prog=document.createElement('div'); prog.className='progress'; prog.style.margin='6px 0';
    const bar=document.createElement('div'); bar.className='bar'; prog.appendChild(bar);
    const status=document.createElement('div'); status.className='muted'; status.textContent='';
    row.appendChild(title); row.appendChild(prog); row.appendChild(status);
    return {row, bar, status};
  }

  async function handleFiles(files){
    const coll=(document.getElementById('pCollection').value||'').trim();
    const meta=metaFromInput();
    for(const file of files){
      const ui=rowForFile(file.name);
      elList.appendChild(ui.row);
      await uploadOne(file, coll, meta, ui);
    }
  }

  async function uploadOne(file, coll, meta, ui){
    const fd=new FormData();
    fd.append('file', file, file.name);
    if(coll) fd.append('collection', coll);
    if(meta!==null){
      // Esli meta — obekt, otpravim kak JSON-stroku
      fd.append('meta', (typeof meta==='string') ? meta : JSON.stringify(meta));
    }
    try{
      const r=await $fetch('/ingest/file',{method:'POST', body:fd});
      const ct=r.headers.get('content-type')||'';
      ui.bar.style.width='100%';
      if(r.ok){
        ui.bar.classList.add('ok');
        if(ct.includes('application/json')){
          const j=await r.json();
          ui.status.textContent = 'OK: '+(j.message || j.status || j.id || 'uploaded');
        }else{
          ui.status.textContent = 'OK: '+(await r.text());
        }
      }else{
        ui.bar.classList.add('err');
        const txt = ct.includes('application/json') ? JSON.stringify(await r.json()) : (await r.text());
        ui.status.textContent = `Oshibka HTTP ${r.status}: `+txt;
      }
    }catch(e){
      ui.bar.style.width='100%';
      ui.bar.classList.add('err');
      ui.status.textContent = 'Set: '+e;
    }
  }

  // ===== Poslednie zagruzki (best-effort: probuem neskolko ruchek)
  let ING=[];

  function normIngest(x){
    return {
      id: x.id || x.uid || x.key || x.name || x.filename || '',
      collection: x.collection || x.namespace || x.index || '',
      size: x.size || x.size_bytes || x.bytes || '',
      created: x.created_at || x.time || x.ts || x.created || '',
      status: x.status || x.state || 'ok'
    };
  }

  async function loadIngests(){
    const urls=[
      '/ingest/list?limit=200',
      '/ingest/files?limit=200',
      '/ops/ingest/list?limit=200',
      '/api/ingest/list?limit=200'
    ];
    for(const u of urls){
      try{
        const r=await $fetch(u, {noCache:true});
        const ct=r.headers.get('content-type')||'';
        if(!r.ok) continue;
        let data=[];
        if(ct.includes('application/json')){
          const j=await r.json();
          data = Array.isArray(j) ? j : (j.items || j.files || j.documents || []);
        }else{
          // Esli kto-to otdal tekstom — propustim
          continue;
        }
        ING = data.map(normIngest);
        renderIngests();
        return;
      }catch(e){}
    }
    // Esli ne nashli spisok — prosto ochistim tablitsu
    ING = [];
    renderIngests();
  }

  function renderIngests(){
    const body=document.getElementById('ingBody'); body.innerHTML='';
    for(const it of ING){
      const tr=document.createElement('tr');
      const td=(t)=>{ const x=document.createElement('td'); x.style.padding='8px 6px'; x.style.borderBottom='1px solid var(--border)'; x.innerHTML=t; return x; };
      tr.appendChild(td(`<code>${it.id}</code>`));
      tr.appendChild(td(it.collection||''));
      tr.appendChild(td(it.size ? String(it.size)+' B' : ''));
      tr.appendChild(td(`<span class="muted">${it.created||''}</span>`));
      const chip = (it.status && String(it.status).toLowerCase().includes('fail'))
        ? `<span class="chip" style="border-color:var(--danger);color:var(--danger)">${it.status}</span>`
        : `<span class="chip" style="border-color:var(--ok);color:var(--ok)">${it.status||'ok'}</span>`;
      tr.appendChild(td(chip));
      body.appendChild(tr);
    }
    if(!ING.length){
      const tr=document.createElement('tr');
      const td=document.createElement('td');
      td.colSpan=5; td.style.padding='10px'; td.innerHTML='<span class="muted">Net dannykh ili spisok nedostupen</span>';
      tr.appendChild(td); document.getElementById('ingBody').appendChild(tr);
    }
  }

  // init
  document.addEventListener('DOMContentLoaded', loadIngests);
</script>

{% endblock %}
