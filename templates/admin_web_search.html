<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester — Veb-poisk i avtokontekst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;margin:24px;line-height:1.46;background:#0b1020;color:#e7eaf6}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .card{background:#0f1430;border:1px solid #223;border-radius:12px;padding:14px;margin-top:12px;max-width:1100px}
    input,button{padding:10px 12px;border-radius:10px;border:1px solid #334;background:#0f1530;color:#e7eaf6}
    button{background:#1e293b;border:1px solid #3b82f6}
    a{color:#82aaff}
    pre{white-space:pre-wrap;max-height:50vh;overflow:auto}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#16213e;color:#cdd6f4;margin-right:6px}
    label{opacity:.9}
  </style>
</head>
<body>
  <h2>Web Search and Context Expansion</h2>
  <div class="card">
    <div class="row">
      <input id="q" placeholder="Request (for example: site:pothon.org asincio)">
      <input id="k" style="width:100px" value="5">
      <label><input id="autofetch" type="checkbox"> avtozagruzka</label>
      <input id="maxfetch" style="width:120px" value="3">
      <button id="btnSearch">Poisk</button>
      <button id="btnExpand">Plan+avtozagruzka</button>
      <a class="pill" href="/metrics/web_search" target="_blank">/metrics/web_search</a>
      <a class="pill" href="/metrics/web_context" target="_blank">/metrics/web_context</a>
    </div>
    <pre id="out">Gotovo.</pre>
  </div>
  <script src="/static/admin_web_search.js"></script>
</body>
</html>
