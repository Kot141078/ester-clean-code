<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Resursnyy planirovschik LLM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,textarea,select{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #243042;padding:8px 6px;text-align:left;vertical-align:top}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    textarea{width:100%;min-height:160px}
  </style>
  <!--
    Zemnoy abzats:
      Dispetcher podbiraet alias po ctx/skorosti/kvotam i zapuskaet korotkiy zapros. V A — dry-run, v B — realnyy vyzov.
    Mosty:
      • Yavnyy — vybor → zapusk → treys-log.
      • Skrytye — kvoty/JSON-kesh i predskazuemye limity.
  -->
</head>
<body>
  <h1>Resursnyy planirovschik LLM <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section class="grid">
    <div>
      <h3>Trebovaniya</h3>
      <label>min ctx <input type="number" id="min_ctx" value="4096" style="width:120px"/></label><br/>
      <label>min tok/s <input type="number" step="0.1" id="min_tokps" value="4" style="width:120px"/></label><br/>
      <label>prefer quant <input type="text" id="pref_q" placeholder="Q4_K_M"/></label><br/>
      <label>prefer aliases <input type="text" id="pref_a" placeholder="alias1;alias2"/></label><br/>
      <label>deny aliases <input type="text" id="deny_a" placeholder="alias3;alias4"/></label><br/>
      <button onclick="choose()">Vybrat resurs</button>
    </div>
    <div>
      <h3>Vybrannyy resurs</h3>
      <pre id="best">—</pre>
      <button onclick="refresh()">Obnovit</button>
      <a class="chip" href="/admin/lmstudio">LM Studio →</a>
    </div>
    <div>
      <h3>Kvoty (chasovye)</h3>
      <pre id="meter">—</pre>
    </div>
  </section>

  <section>
    <h3>Progon cherez resurs</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="alias" placeholder="alias" style="min-width:220px"/>
      <input id="maxtok" type="number" value="64" style="width:120px"/>
      <input id="temp" type="number" step="0.1" value="0.0" style="width:120px"/>
      <button onclick="run()">Prognat</button>
    </div>
    <textarea id="prompt" placeholder="Vvedite prompt..."></textarea>
    <pre id="out">—</pre>
  </section>

  <section>
    <h3>Poslednie zapuska</h3>
    <pre id="traces">—</pre>
  </section>

  <section>
    <h3>RAW status</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function refresh(){
  const r = await fetch('/admin/resources/scheduler/status'); const j = await r.json().catch(()=>({ok:false}));
  if(!j.ok) return;
  document.getElementById('meter').textContent = JSON.stringify(j.meter, null, 2);
  document.getElementById('traces').textContent = JSON.stringify(j.traces, null, 2);
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
}
async function choose(){
  const body={
    min_ctx: parseInt(document.getElementById('min_ctx').value,10)||0,
    min_tokps: parseFloat(document.getElementById('min_tokps').value)||0,
    prefer_quant: document.getElementById('pref_q').value.trim(),
    prefer_aliases: (document.getElementById('pref_a').value.trim()||'').split(';').filter(Boolean),
    deny_aliases: (document.getElementById('deny_a').value.trim()||'').split(';').filter(Boolean),
  };
  const r = await fetch('/admin/resources/scheduler/choose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('best').textContent = JSON.stringify(j, null, 2);
  if(j?.result?.best?.alias){ document.getElementById('alias').value = j.result.best.alias; }
}
async function run(){
  const body={
    alias: document.getElementById('alias').value.trim(),
    prompt: document.getElementById('prompt').value,
    max_tokens: parseInt(document.getElementById('maxtok').value,10)||64,
    temperature: parseFloat(document.getElementById('temp').value)||0.0
  };
  const r = await fetch('/admin/resources/scheduler/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
  await refresh();
}
refresh().catch(()=>{});
</script>
</body>
</html>
