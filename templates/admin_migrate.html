<!doctype html>
<meta charset="utf-8">
<title>Ester — Migrate to Safe Scenarios</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:18px;max-width:980px}
  textarea{width:100%;min-height:180px}
  button{padding:8px 12px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:160px;white-space:pre-wrap}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
</style>
<h2>Migrate to Safe Scenarios</h2>

<div class="row">
  <button onclick="demo()">Load demo</button>
  <button onclick="preview()">Preview</button>
  <button onclick="exp()">Export</button>
</div>

<textarea id="src">[
{"title":"Otkryt menyu","action":{"type":"hotkey","seq":"ALT+F"}},
{"title":"Save fayl","action":{"type":"hotkey","seq":"CTRL+S"}}
]</textarea>

<pre id="out"></pre>

<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }

function demo(){
  src.value='['+
  '{"title":"Otkryt menyu","action":{"type":"hotkey","seq":"ALT+F"}},'+
  '{"title":"Save fayl","action":{"type":"hotkey","seq":"CTRL+S"}}'+
  ']';
}

async function preview(){ out(await j('POST','/migrate/preview',{"steps":JSON.parse(src.value||"[]")})); }
async function exp(){ out(await j('POST','/migrate/export',{"steps":JSON.parse(src.value||"[]")})); }
</script>
