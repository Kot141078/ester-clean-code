<!doctype html>
<meta charset="utf-8">
<title>Ester — Adaptive Quota</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:20px;max-width:820px}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
  input,button{padding:8px;border:1px solid #ccc;border-radius:8px}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:120px;white-space:pre-wrap}
</style>
<h2>Adaptive Quota</h2>
<div class="row">
  Room <input id="room" value="test">
  qmin <input id="qmin" type="number" value="2">
  qmax <input id="qmax" type="number" value="15">
  k <input id="k" type="number" step="0.1" value="2.0">
  <button onclick="cfg()">Start</button>
</div>
<div class="row">
  Client <input id="client" value="bob">
  rtt_ms <input id="rtt" type="number" value="80">
  <button onclick="hb()">Heartbeat</button>
  <button onclick="qs()">Quotas</button>
  <button onclick="st()">Status</button>
</div>
<pre id="out"></pre>
<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }
async function cfg(){ out(await j('POST','/adaptive_quota/config',{"room":room.value,"qmin":+qmin.value,"qmax":+qmax.value,"k":+k.value})); }
async function hb(){ out(await j('POST','/adaptive_quota/hb',{"room":room.value,"client":client.value,"rtt_ms":+rtt.value})); }
async function qs(){ const r=await fetch('/adaptive_quota/quotas?room='+encodeURIComponent(room.value)); out(await r.json()); }
async function st(){ const r=await fetch('/adaptive_quota/status?room='+encodeURIComponent(room.value)); out(await r.json()); }
</script>
