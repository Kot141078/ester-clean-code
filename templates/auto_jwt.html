<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Claire · Avto-JWT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root{
      --bg:#0b0e11; --panel:#121821; --muted:#8aa0b4; --txt:#e6eef7; --line:#243140;
      --acc:#4cc9f0; --ok:#7ae582; --bad:#ef476f; --br:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,Inter,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:640px;margin:0 auto;padding:16px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--br);padding:16px}
    h1{margin:0 0 10px}
    label{display:block;color:var(--muted);font-size:12px;margin:8px 0 4px}
    input,button,textarea{border-radius:12px;border:1px solid #2a3a50;background:#0b0f15;color:var(--txt);padding:10px 12px;font:inherit}
    input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(76,201,240,.12)}
    .muted{color:var(--muted)}
    textarea{min-height:140px;width:100%;resize:vertical;font-family:ui-monospace,Consolas,Menlo,monospace}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid #2a3244;background:#11151c;color:#a1a7b1;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Avtovypusk JWT</h1>
      <p class="muted">Enter a name - a token will be generated automatically. For Ovner the roles will be admin, user (see. <span class="badge">ADMIN_USERNAMES</span>).</p>
      <label for="user">Username</label>
      <input id="user" placeholder="Owner" value="Owner" autocomplete="name" autofocus/>
      <div class="row" style="margin-top:8px">
        <a class="badge" href="/auth/ui">GVT (manual mode)</a>
        <a class="badge" href="/chat/telegram">Lenta Telegram</a>
        <a class="badge" href="/routes_index.html">Marshruty</a>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>Token</h2>
      <textarea id="tok" placeholder="— avto-JWT poyavitsya zdes —" spellcheck="false"></textarea>
      <p class="muted">Token sokhranen v <code>localStorage("jwt")</code>. It will be picked up by the ribbon/control UI automatically.</p>
      <pre id="log" style="white-space:pre-wrap;max-height:240px;overflow:auto"></pre>
    </div>
  </div>

  <script>
    const $ = (s)=>document.querySelector(s);
    function setJwt(tok){ try{ localStorage.setItem("jwt", tok||""); }catch{} }
    function getJwt(){ try{ return localStorage.getItem("jwt")||""; }catch{ return ""; } }
    async function jpost(url, body){
      const resp = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body||{})});
      const raw = await resp.text(); let js=null; try{ js=JSON.parse(raw);}catch{}
      return {ok:resp.ok, status:resp.status, json:js, raw};
    }
    async function issue(name){
      const user = (name||"").trim(); if (!user) return;
      const r = await jpost("/auth/login", {user});
      $("#log").textContent = r.json?JSON.stringify(r.json,null,2):r.raw;
      if (r.ok && r.json && r.json.access_token){
        $("#tok").value = r.json.access_token;
        setJwt(r.json.access_token);
      }
    }
    let timer = null;
    $("#user").addEventListener("input", ()=>{
      clearTimeout(timer);
      const val = ($("#user").value||"").trim();
      if (!val) return;
      timer = setTimeout(()=>issue(val), 400); // auto-generation after 400 ms of “silence”
    });
    $("#user").addEventListener("keydown", (e)=>{
      if (e.key === "Enter") { e.preventDefault(); issue(($("#user").value||"").trim()); }
    });
    // show current token
    const tok = getJwt(); if (tok) $("#tok").value = tok;
  </script>
</body>
</html>
