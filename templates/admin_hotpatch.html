<!doctype html>
<meta charset="utf-8">
<title>Ester — Instructor Hotpatch</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:18px;max-width:980px}
  button{padding:8px 12px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:160px;white-space:pre-wrap}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
</style>
<h2>Instructor Hotpatch</h2>
<div class="row">
  Radius <input id="r" type="number" value="80">
  Penalty <input id="p" type="number" step="0.01" value="0.05">
  Min Thr <input id="mt" type="number" step="0.01" value="0.82">
</div>
<div class="row">
  Lang <input id="lang" value="eng+rus">
  <label><input id="sc" type="checkbox" checked> use scale from calibrate</label>
</div>
<div class="row">
  <button onclick="prev()">Preview</button>
  <button onclick="apply()">Apply</button>
</div>
<pre id="out"></pre>
<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); return r.json(); }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }
async function prev(){ out(await j('POST','/instructor/hotpatch/preview',{"radius":+r.value,"penalty":+p.value,"min_thr":+mt.value,"lang":lang.value,"use_scale":sc.checked})); }
async function apply(){ out(await j('POST','/instructor/hotpatch/apply',{"radius":+r.value,"penalty":+p.value,"min_thr":+mt.value,"lang":lang.value,"use_scale":sc.checked})); }
</script>
