<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester — Aid (Papa)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;margin:24px;line-height:1.46;background:#0b1020;color:#e7eaf6}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .card{background:#0f1430;border:1px solid #223;border-radius:12px;padding:14px;margin-top:12px;max-width:1200px}
    input,button,textarea{padding:10px 12px;border-radius:10px;border:1px solid #334;background:#0f1530;color:#e7eaf6}
    textarea{width:100%;min-height:120px}
    button{background:#1e293b;border:1px solid #3b82f6}
    a{color:#82aaff}
    pre{white-space:pre-wrap;max-height:50vh;overflow:auto}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#16213e;color:#cdd6f4;margin-right:6px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:1000px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <h2>Care and SAUCE for Dad</h2>

  <div class="card">
    <div class="row">
      <a class="pill" href="/aid/contacts" target="_blank">kontakty</a>
      <a class="pill" href="/aid/fin/discovery/status" target="_blank">fin.obnaruzhenie</a>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>SOS</h3>
      <input id="sit" placeholder="situatsiya" value="rezkaya bol v grudi">
      <input id="loc" placeholder="lokatsiya" value="DefaultCity">
      <div class="row">
        <button id="btnPlan">Plan SOS</button>
        <button id="btnSim">Simulyatsiya</button>
        <button id="btnTrig">Vypolnit bezopasnoe</button>
      </div>
      <pre id="outSos">Gotovo.</pre>
    </div>

    <div class="card">
      <h3>Kontakty</h3>
      <div class="row">
        <input id="k" placeholder="kind" value="papa">
        <input id="nm" placeholder="name" value="Owner">
        <input id="ch" placeholder="channel" value="phone">
        <input id="val" placeholder="value" value="+32...">
        <input id="pr" placeholder="priority" value="1">
        <button id="btnAdd">Dobavit</button>
      </div>
      <pre id="outContacts">Gotovo.</pre>
    </div>

    <div class="card">
      <h3>Finance (soft detection)</h3>
      <div class="row">
        <input id="scope" placeholder="scope" value="basic">
        <button id="btnFinStart">Start</button>
        <button id="btnFinStatus">Status</button>
      </div>
      <pre id="outFin">Gotovo.</pre>
    </div>
  </div>

  <script src="/static/aid_console.js"></script>
</body>
</html>
