{% extends "_admin_base.html" %}
{% block content %}

<section class="card" style="margin-bottom:12px">
  <div class="row" style="gap:10px;align-items:center;flex-wrap:wrap">
    <h2 style="margin:0">Sny / Initsiativy</h2>
    <span class="chip">/hypotheses</span>
    <div class="spacer"></div>
    <a class="navlink" href="/portal">← Nazad v /portal</a>
  </div>
</section>

<section class="card" style="margin-bottom:12px">
  <div class="row" style="gap:10px;margin-bottom:8px">
    <input id="hTitle" class="input" style="min-width:320px" placeholder="Zagolovok novoy initsiativy…">
    <input id="hTags" class="input" placeholder="tegi (cherez zapyatuyu)">
    <select id="hPriority" class="input">
      <option value="normal">normal</option>
      <option value="low">low</option>
      <option value="high">high</option>
      <option value="urgent">urgent</option>
    </select>
    <button class="btn" onclick="hCreate()">Sozdat</button>
    <div class="spacer"></div>
    <input id="hFilter" class="input" placeholder="filtr po tekstu/tegam/statusu…" oninput="hRender()">
    <select id="hSort" class="input" onchange="hRender()">
      <option value="id_asc">ID ↑</option>
      <option value="id_desc">ID ↓</option>
      <option value="prio_desc">Prioritet ↓</option>
      <option value="prio_asc">Prioritet ↑</option>
      <option value="title_asc">Zagolovok A→Z</option>
      <option value="title_desc">Zagolovok Z→A</option>
      <option value="status_asc">Status A→Z</option>
      <option value="status_desc">Status Z→A</option>
    </select>
    <button class="btn" onclick="hLoad()">Obnovit</button>
  </div>

  <div class="box" style="overflow:auto">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">ID</th>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Zagolovok</th>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Tegi</th>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Prioritet</th>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Status</th>
        <th style="text-align:left;padding:6px;border-bottom:1px solid var(--border)">Deystviya</th>
      </tr></thead>
      <tbody id="hBody"></tbody>
    </table>
  </div>
</section>

<section class="card">
  <div class="row" style="gap:8px;align-items:center;margin-bottom:6px">
    <h3 style="margin:0">Bystrye ssylki</h3>
  </div>
  <div class="row" style="gap:8px;flex-wrap:wrap">
    <button class="btn" onclick="openNew('/hypotheses')">/hypotheses</button>
    <button class="btn" onclick="openNew('/routes')">/routes</button>
    <button class="btn" onclick="openNew('/docs')">Swagger</button>
    <button class="btn" onclick="openNew('/openapi.json')">OpenAPI</button>
  </div>
</section>

<script>
  let H = [];

  function hTags(s){ return Array.isArray(s)?s: (s? String(s).split(',').map(x=>x.trim()).filter(Boolean):[]); }
  function hNorm(o){
    const id = o.id || o._id || o.uid || o.key || o.uuid || o.pk;
    return {
      id,
      title: o.title || o.name || o.text || o.summary || '',
      tags: hTags(o.tags || o.labels || o.keywords),
      priority: o.priority || o.prio || 'normal',
      status: o.status || o.state || 'new'
    };
  }

  function prioRank(p){
    const order = {urgent:3, high:2, normal:1, low:0};
    return order[(p||'normal').toLowerCase()] ?? 1;
    }

  async function hLoad(){
    let j=null;
    const urls=[
      '/hypotheses/json?limit=500',
      '/hypotheses/list?limit=500',
      '/hypotheses?format=json&limit=500',
      '/api/hypotheses?limit=500'
    ];
    for(const u of urls){
      try{ const r=await $fetch(u, {noCache:true}); j=await r.json(); break; }catch(e){}
    }
    const items = j ? (Array.isArray(j)?j:(j.items||j.hypotheses||[])) : [];
    H = items.map(hNorm);
    hRender();
  }

  function hRender(){
    const body=document.getElementById('hBody'); body.innerHTML='';
    const q=(document.getElementById('hFilter').value||'').toLowerCase();
    const sort=(document.getElementById('hSort').value||'id_asc');

    let rows = H.slice().filter(h => {
      if(!q) return true;
      const blob = `${h.id} ${h.title} ${h.tags.join(' ')} ${h.priority} ${h.status}`.toLowerCase();
      return blob.includes(q);
    });

    rows.sort((a,b)=>{
      switch(sort){
        case 'id_desc': return String(b.id).localeCompare(String(a.id));
        case 'prio_desc': return prioRank(b.priority) - prioRank(a.priority);
        case 'prio_asc': return prioRank(a.priority) - prioRank(b.priority);
        case 'title_asc': return (a.title||'').localeCompare(b.title||'');
        case 'title_desc': return (b.title||'').localeCompare(a.title||'');
        case 'status_asc': return (a.status||'').localeCompare(b.status||'');
        case 'status_desc': return (b.status||'').localeCompare(a.status||'');
        case 'id_asc':
        default: return String(a.id).localeCompare(String(b.id));
      }
    });

    for(const h of rows){
      const tr=document.createElement('tr');
      const td=(t)=>{ const x=document.createElement('td'); x.style.padding='8px 6px'; x.style.borderBottom='1px solid var(--border)'; x.innerHTML=t; return x; };

      tr.appendChild(td(`<code>${h.id||'—'}</code>`));

      // title
      const tdT = td('');
      const inpT = document.createElement('input'); inpT.className='input'; inpT.style.minWidth='260px'; inpT.value=h.title;
      inpT.onkeydown=(e)=>{ if(e.key==='Enter') hUpdate(h.id, 'title', inpT.value); };
      tdT.appendChild(inpT); tr.appendChild(tdT);

      // tags
      const tdG = td('');
      const inpG = document.createElement('input'); inpG.className='input'; inpG.value=h.tags.join(', ');
      inpG.onkeydown=(e)=>{ if(e.key==='Enter') hUpdate(h.id, 'tags', inpG.value); };
      tdG.appendChild(inpG); tr.appendChild(tdG);

      // priority
      const tdP = td('');
      const selP = document.createElement('select'); selP.className='input';
      ['low','normal','high','urgent'].forEach(p=>{
        const o=document.createElement('option'); o.value=p; o.textContent=p; if(p===h.priority) o.selected=true; selP.appendChild(o);
      });
      selP.onchange=()=> hUpdate(h.id,'priority',selP.value);
      tdP.appendChild(selP); tr.appendChild(tdP);

      // status
      const tdS = td('');
      const selS = document.createElement('select'); selS.className='input';
      ['new','accepted','in_progress','done','rejected','paused'].forEach(s=>{
        const o=document.createElement('option'); o.value=s; o.textContent=s; if(s===h.status) o.selected=true; selS.appendChild(o);
      });
      selS.onchange=()=> hUpdate(h.id,'status',selS.value);
      tdS.appendChild(selS); tr.appendChild(tdS);

      // actions
      const tdA = td('');
      const bSave=document.createElement('button'); bSave.className='btn'; bSave.textContent='Save';
      bSave.onclick=()=> {
        hUpdate(h.id, 'title', inpT.value);
        hUpdate(h.id, 'tags', inpG.value);
        hUpdate(h.id, 'priority', selP.value);
        hUpdate(h.id, 'status', selS.value);
      };
      const bDel=document.createElement('button'); bDel.className='btn'; bDel.style.marginLeft='6px'; bDel.textContent='Udalit';
      bDel.onclick=()=> hDel(h.id);
      tdA.appendChild(bSave); tdA.appendChild(bDel);
      tr.appendChild(tdA);

      body.appendChild(tr);
    }
  }

  async function hCreate(){
    const title=(document.getElementById('hTitle').value||'').trim(); if(!title){ alert('Zagolovok?'); return; }
    const tags=hTags(document.getElementById('hTags').value||''); const priority=(document.getElementById('hPriority').value||'normal');
    const payload={title, tags, priority};
    const urls=['/hypotheses','/hypotheses/create','/api/hypotheses'];
    for(const u of urls){
      try{ const r=await $fetch(u,{method:'POST', body: JSON.stringify(payload)}); if(r.ok){ document.getElementById('hTitle').value=''; document.getElementById('hTags').value=''; await hLoad(); return; } }
      catch(e){}
    }
    alert('Ne udalos sozdat');
  }

  async function hUpdate(id, field, value){
    if(!id) return;
    const payload={id}; payload[field]=value;
    const urls=[`/hypotheses/${encodeURIComponent(id)}`, '/hypotheses/update', '/api/hypotheses/update'];
    for(const u of urls){
      try{
        const method = u.includes('/update') ? 'POST' : 'PUT';
        const r=await $fetch(u,{method, body: JSON.stringify(payload)}); if(r.ok) return;
      }catch(e){}
    }
    alert('Ne udalos obnovit '+id);
  }

  async function hDel(id){
    if(!id) return;
    if(!confirm('Udalit '+id+'?')) return;
    const urls=[`/hypotheses/${encodeURIComponent(id)}`, '/hypotheses/delete', '/api/hypotheses/delete'];
    for(const u of urls){
      try{
        const method = u.includes('/delete') ? 'POST' : 'DELETE';
        const r=await $fetch(u,{method, body: JSON.stringify({id})}); if(r.ok){ await hLoad(); return; }
      }catch(e){}
    }
    alert('Ne udalos udalit '+id);
  }

  document.addEventListener('DOMContentLoaded', hLoad);
</script>

{% endblock %}
