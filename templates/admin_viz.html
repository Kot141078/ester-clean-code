<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Viz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;color:#111}
    input,button{padding:8px 12px;border:1px solid #ddd;border-radius:10px}
    .row{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
    pre{background:#f7f7f7;padding:10px;border-radius:10px;max-height:60vh;overflow:auto;white-space:pre}
  </style>
</head>
<body>
  <h1>ASCII-skhemy</h1>
  <div class="row">
    <input id="title" placeholder="zagolovok" value="Plan"/>
    <input id="steps" placeholder="steps separated by commas" value="Collect,Judge,Act,Review"/>
    <button onclick="run()">Postroit</button>
  </div>
  <pre id="out">—</pre>

<script>
async function run(){
  const r = await fetch('/viz/plan',{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      title: document.getElementById('title').value,
      steps: (document.getElementById('steps').value||'').split(',').map(s=>s.trim()).filter(Boolean)
    })});
  const j = await r.json();
  document.getElementById('out').textContent = (j.ascii || '—');
}
</script>
</body>
</html>
