<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Bridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;color:#111}
    input,button{padding:8px 12px;border:1px solid #ddd;border-radius:10px}
    .row{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
    pre{background:#f7f7f7;padding:10px;border-radius:10px;max-height:60vh;overflow:auto}
  </style>
</head>
<body>
  <h1>Personal ↔ Global Bridge</h1>
  <div class="row">
    <input id="q" placeholder="vopros / klyuchevye slova" style="min-width:360px"/>
    <button onclick="run()">Iskat</button>
  </div>
  <pre id="out">—</pre>

<script>
async function run(){
  const r=await fetch('/bridge/query',{method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({q: document.getElementById('q').value, topk: 7})});
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
</script>
</body>
</html>
