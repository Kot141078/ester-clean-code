<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester · Konstruktor pisem</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { --fg:#111; --bg:#fff; --muted:#666; --line:#eee; --accent:#0a7; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif; color:var(--fg); background:var(--bg); }
    header { padding:16px 20px; border-bottom:1px solid var(--line); }
    main { max-width:960px; margin:0 auto; padding:20px; display:grid; gap:16px; }
    .card { border:1px solid var(--line); border-radius:12px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    select, textarea, input[type=text] { width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; font-size:15px; }
    textarea { min-height:220px; }
    button { padding:10px 14px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
    .row { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
    pre { white-space:pre-wrap; background:#f9f9f9; border:1px dashed #ddd; padding:12px; border-radius:10px; }
    .muted { color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
<header><strong>Konstruktor pisem</strong> · Ester</header>
<main>
  <div class="row">
    <div class="card">
      <label>Auditoriya</label>
      <select id="audience">
        <option value="lawyer">Advokat</option>
        <option value="student">Shkolnik/student</option>
        <option value="friend">Drug</option>
        <option value="business">Biznes</option>
        <option value="medic">Medik</option>
        <option value="bank">Bank</option>
        <option value="gov">Gosorgan</option>
        <option value="engineer">Inzhener</option>
        <option value="teacher">Uchitel</option>
        <option value="investor">Investor</option>
        <option value="neutral" selected>Neytralno</option>
      </select>
    </div>
    <div class="card">
      <label>Namerenie</label>
      <select id="intent">
        <option value="letter" selected>Pismo</option>
        <option value="update">Obnovlenie</option>
        <option value="request">Prosba</option>
        <option value="reminder">Napominanie</option>
        <option value="apology">Izvinenie</option>
      </select>
    </div>
    <div class="card">
      <label>Tema (optsionalno)</label>
      <input id="subject" type="text" placeholder="Subject of the letter (does not affect the text, for reference)">
      <div class="muted">The topic is not yet used in generation - just a note for you.</div>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <label>Smysl / fakty pisma</label>
      <textarea id="content" placeholder="Write facts, dates, amounts, case/account numbers, requests - in human words."></textarea>
      <div style="margin-top:12px; display:flex; gap:8px;">
        <button id="btnPreview">Predprosmotr</button>
        <button id="btnCopy">Skopirovat</button>
      </div>
    </div>
    <div class="card">
      <label>Predprosmotr pisma</label>
      <pre id="preview">(zdes poyavitsya pismo)</pre>
    </div>
  </div>
</main>
<script>
  const $ = s => document.querySelector(s);
  async function preview() {
    const body = {
      audience: $('#audience').value,
      intent: $('#intent').value,
      content: $('#content').value
    };
    const r = await fetch('/mail/compose/preview', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const j = await r.json();
    $('#preview').textContent = j.text || JSON.stringify(j, null, 2);
  }
  async function copyText() {
    const text = $('#preview').textContent || '';
    try { await navigator.clipboard.writeText(text); alert('Skopirovano.'); } catch(e){ alert('Ne poluchilos skopirovat.'); }
  }
  $('#btnPreview').addEventListener('click', preview);
  $('#btnCopy').addEventListener('click', copyText);
</script>
</body>
</html>
