<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Signals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body {font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; color:#111;}
    h1 {margin: 0 0 12px 0;}
    .row {display:flex; gap:12px; margin: 12px 0;}
    button {padding:10px 14px; border-radius:10px; border:1px solid #ddd; cursor:pointer;}
    button.info {background:#eef7ff;}
    button.warn {background:#fff7e6;}
    button.err {background:#ffefef;}
    pre {background:#f7f7f7; padding:10px; border-radius:10px; overflow:auto; max-height:50vh;}
    small{color:#555;}
  </style>
</head>
<body>
  <h1>Indikatsii Ester</h1>
  <p><small>The A/B toggle switch and auto-cutback are controlled via ENV. The log is stored locally in the article.</small></p>

  <div class="row">
    <button class="info" onclick="send('info')">ℹ️ Impuls (info)</button>
    <button class="warn" onclick="send('warn')">⚠️ Impuls (warn)</button>
    <button class="err"  onclick="send('error')">🛑 Impuls (error)</button>
  </div>

  <div class="row">
    <button onclick="loadState()">Update status</button>
  </div>

  <h3>Sostoyanie</h3>
  <pre id="out">—</pre>

  <script>
    async function send(level){
      const r = await fetch('/signals/pulse', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({level:level, ttl_ms: 400})
      });
      const j = await r.json();
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    }
    async function loadState(){
      const r = await fetch('/signals/state?limit=25');
      const j = await r.json();
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    }
    loadState();
  </script>
</body>
</html>
