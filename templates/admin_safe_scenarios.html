<!doctype html>
<meta charset="utf-8">
<title>Ester — Safe Scenarios</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:18px;max-width:980px}
  textarea{width:100%;min-height:160px}
  button{padding:8px 12px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:120px;white-space:pre-wrap}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
</style>

<h2>Safe Scenarios (with rollback)</h2>

<div class="row">
  <button onclick="demo()">Load demo</button>
  <button onclick="run()">Run</button>
  <button onclick="stat()">Status</button>
</div>

<textarea id="steps">[
{"title":"Otkryt menyu","do":{"type":"hotkey","seq":"ALT+F"},"check":{"kind":"ocr_contains","text":"Fayl","timeout_ms":4000},"undo":{"type":"hotkey","seq":"ESC"}},
{"title":"Save","do":{"type":"hotkey","seq":"CTRL+S"},"check":{"kind":"template_match","template_b64":"...","threshold":0.78,"timeout_ms":3000},"undo":{"type":"hotkey","seq":"ESC"}}
]</textarea>

<pre id="out"></pre>

<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }

function demo(){
  steps.value='['+
  '{"title":"Otkryt menyu","do":{"type":"hotkey","seq":"ALT+F"},"check":{"kind":"ocr_contains","text":"Fayl","timeout_ms":4000},"undo":{"type":"hotkey","seq":"ESC"}},'+
  '{"title":"Save","do":{"type":"hotkey","seq":"CTRL+S"},"check":{"kind":"template_match","template_b64":"...","threshold":0.78,"timeout_ms":3000},"undo":{"type":"hotkey","seq":"ESC"}}'+
  ']';
}
async function run(){ out(await j('POST','/safe_scenarios/run',{"steps":JSON.parse(steps.value||"[]")})); }
async function stat(){ out(await j('GET','/safe_scenarios/status')); }
</script>
