<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester — Kaskad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;margin:24px;line-height:1.46;background:#0b1020;color:#e7eaf6}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .card{background:#0f1430;border:1px solid #223;border-radius:12px;padding:14px;margin-top:12px;max-width:1100px}
    input,button,textarea{padding:10px 12px;border-radius:10px;border:1px solid #334;background:#0f1530;color:#e7eaf6}
    textarea{width:100%;min-height:120px}
    button{background:#1e293b;border:1px solid #3b82f6}
    a{color:#82aaff}
    pre{white-space:pre-wrap;max-height:50vh;overflow:auto}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#16213e;color:#cdd6f4;margin-right:6px}
  </style>
</head>
<body>
  <h2>Kaskadnoe myshlenie</h2>
  <div class="card">
    <div class="row">
      <textarea id="goal" placeholder="Tsel (naprimer: nuzhna USB-kamera dlya zhestov)"></textarea>
      <button id="btnPlan">Splanirovat</button>
      <button id="btnExec">Ispolnit (bezopasnye shagi)</button>
      <a class="pill" href="/economy/ledger" target="_blank">/economy/ledger</a>
      <a class="pill" href="/ops/assignments" target="_blank">/ops/assignments</a>
      <a class="pill" href="/metrics/thinking_cascade" target="_blank">/metrics/thinking_cascade</a>
    </div>
    <pre id="out">Gotovo.</pre>
  </div>
  <script src="/static/admin_cascade.js"></script>
</body>
</html>
