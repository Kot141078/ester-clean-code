<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Ester — Poslednie video-konspekty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;margin:24px;line-height:1.46}
    .muted{color:#666}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}
    th{background:#fafafa}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef;margin-right:4px}
    .wrap{white-space:pre-wrap}
  </style>
</head>
<body>
  <h2>Poslednie video-konspekty</h2>
  <p class="muted">Data source: files <code>data/video_ingest/rep_*.json</code> (yadro ingest_video).</p>
  <table>
    <thead>
      <tr>
        <th>ts</th>
        <th>istochnik</th>
        <th>backend</th>
        <th>format</th>
        <th>konspekt (fragment)</th>
        <th>damp</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r.ts }}</td>
        <td class="wrap">{{ r.src }}</td>
        <td><span class="pill">{{ r.backend }}</span></td>
        <td>{{ r.probe_format }}</td>
        <td class="wrap">{{ r.summary }}</td>
        <td class="wrap">{{ r.dump_path }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <script src="/static/portal_video.js"></script>
</body>
</html>
