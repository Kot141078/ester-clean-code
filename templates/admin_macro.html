<!doctype html>
<meta charset="utf-8">
<title>Ester — Macro Recorder</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:20px;max-width:900px}
  .row{display:flex;gap:10px;align-items:center;margin:10px 0}
  input,button,textarea{padding:8px;border:1px solid #ccc;border-radius:8px}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:160px;white-space:pre-wrap}
</style>
<h2>Macro Recorder → Safe Scenario</h2>
<div class="row">
  <button onclick="arm()">Arm</button>
  <button onclick="disarm()">Disarm</button>
  <button onclick="preview()">Preview</button>
  <button onclick="export_()">Export safe</button>
</div>

<div class="row">
  Quick add event:
  <select id="kind">
    <option value="hotkey">hotkey</option>
    <option value="type_text">type_text</option>
    <option value="mouse_click">mouse_click</option>
  </select>
  <input id="val" placeholder='CTRL+S / hello / "100,200"'>
  <button onclick="add()">Add</button>
</div>

<pre id="out"></pre>

<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent = JSON.stringify(x,null,2); }

async function arm(){ out(await j('POST','/macro/arm',{})); }
async function disarm(){ out(await j('POST','/macro/disarm',{})); }
async function preview(){ out(await j('GET','/macro/preview')); }
async function export_(){ out(await j('GET','/macro/export')); }

async function add(){
  const k=kind.value, v=val.value||'';
  let ev={type:k};
  if(k==='hotkey'){ ev.seq=v; }
  if(k==='type_text'){ ev.value=v; }
  if(k==='mouse_click'){ const a=(v.split(',').map(x=>+x.trim())); ev.x=a[0]||100; ev.y=a[1]||100; }
  out(await j('POST','/macro/record',ev));
}
</script>
