<!doctype html>
<meta charset="utf-8">
<title>Ester — Mass Tuner</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:18px;max-width:980px}
  button{padding:8px 12px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:140px;white-space:pre-wrap}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
</style>
<h2>Mass Tuner (Triggers)</h2>
<div class="row">
  Lang <input id="lang" value="eng+rus">
  Threshold <input id="thr" type="number" step="0.01" value="0.8">
  <label><input id="sc" type="checkbox" checked> scale from calibrate</label>
  <button onclick="prev()">Preview</button>
  <button onclick="apply()">Apply</button>
</div>
<pre id="out"></pre>
<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }
async function prev(){ out(await j('POST','/mass_tuner/preview',{"lang":lang.value,"threshold":+thr.value,"scale_from_calibrate":sc.checked})); }
async function apply(){ out(await j('POST','/mass_tuner/apply',{"lang":lang.value,"threshold":+thr.value,"scale_from_calibrate":sc.checked})); }
</script>
