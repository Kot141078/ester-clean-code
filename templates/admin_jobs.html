<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — LAN-Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,select,textarea{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    code{background:#0b121d;padding:2px 6px;border-radius:6px}
  </style>
  </head>
<body>
  <h1>LAN-Jobs <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section class="grid">
    <div>
      <h3>Local queue</h3>
      <button onclick="refresh()">Update local status</button>
      <button onclick="runOnce()">Vypolnit odno</button>
      <pre id="local">—</pre>
    </div>
    <div>
      <h3>Push na pir</h3>
      <div class="row">
        <input id="base" placeholder="http://192.168.1.10:5000" style="width:100%"/>
      </div>
      <div class="row" style="margin-top:8px">
        <select id="type">
          <option value="build_ticket">build_ticket</option>
          <option value="selfcheck">selfcheck</option>
          <option value="selfcheck_publish">selfcheck_publish</option>
          <option value="proj_build_publish">proj_build_publish</option> </select>
        <label class="row"><input type="checkbox" id="public" checked/> public</label>
        <button onclick="push()">Push via proxy</button>
      </div>
      <textarea id="args" placeholder='{"project_dir":"/path/on/remote","publish":true,"max_bytes":524288000,"quotas":{"cpu_s":30,"wall_s":120,"maxrss_mb":2048}}' style="width:100%;min-height:80px"></textarea>
      <pre id="pushout">—</pre>
    </div>
    <div>
      <h3>Remote index</h3>
      <div class="row">
        <button onclick="remote()">Zagruzit</button>
      </div>
      <pre id="remote">—</pre>
    </div>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function refresh(){
  const r = await fetch('/admin/jobs/status'); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('local').textContent = JSON.stringify(j, null, 2);
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
}
async function runOnce(){
  const r = await fetch('/admin/jobs/run_once',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  await refresh();
}
async function push(){
  const base=document.getElementById('base').value.trim(); if(!base){ alert('Ukazhi pir'); return; }
  let args={}; try{ args = JSON.parse(document.getElementById('args').value||'{}'); }catch(e){ alert('Plokhoy JSON v args'); return; }
  const body={base_url: base, type: document.getElementById('type').value, args, public: document.getElementById('public').checked};
  const r = await fetch('/admin/jobs/push_proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('pushout').textContent = JSON.stringify(j, null, 2);
}
async function remote(){
  const base=document.getElementById('base').value.trim(); if(!base){ alert('Ukazhi pir'); return; }
  const r = await fetch('/admin/jobs/remote_index_proxy?base='+encodeURIComponent(base));
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('remote').textContent = JSON.stringify(j, null, 2);
}
refresh().catch(()=>{});
</script>
</body>
</html>
