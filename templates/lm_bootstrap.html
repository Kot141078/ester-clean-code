<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Bootstrap LM Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,select,textarea{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    code{background:#0b121d;padding:2px 6px;border-radius:6px}
    label.inline{display:flex;gap:8px;align-items:center;margin:4px 0}
  </style>
  <!--
    Zemnoy abzats:
      Odin ekran dlya pervogo zapuska LM Studio: ustanovka → proverka API → privyazka alias → probnyy vyzov.
    Mosty:
      • Yavnyy — UX poverkh ustanovki i raboty s lokalnym /v1 API.
      • Skrytye — plan pered deystviem, minimalnye taymauty/obemy, ploskie JSON.
  -->
</head>
<body>
  <h1>Bootstrap LM Studio <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section class="grid">
    <div>
      <h3>Sistema i installyatory</h3>
      <button onclick="load()">Obnovit</button>
      <pre id="sys">—</pre>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="plan()">Plan ustanovki</button>
        <button onclick="run()">Zapustit ustanovku</button>
      </div>
      <pre id="inst">—</pre>
    </div>
    <div>
      <h3>Proverka endpoint</h3>
      <input id="ep" placeholder="http://127.0.0.1:1234/v1" style="width:100%"/>
      <button onclick="check()">Check /v1/models</button>
      <pre id="chk">—</pre>
      <h3 style="margin-top:12px">Auto-bind alias</h3>
      <input id="alias" placeholder="lm_local" />
      <input id="model" placeholder="model-id (iz spiska)" />
      <button onclick="bind()">Privyazat</button>
      <pre id="bind">—</pre>
    </div>
    <div>
      <h3>Smoke chat</h3>
      <textarea id="prompt" placeholder="ping" style="width:100%;min-height:120px">ping</textarea>
      <label class="inline">max_tokens <input id="maxtok" type="number" value="8" style="width:120px"/></label>
      <label class="inline">T <input id="temp" type="number" step="0.1" value="0.0" style="width:120px"/></label>
      <button onclick="smoke()">Zapustit</button>
      <pre id="smk">—</pre>
      <h3 style="margin-top:12px">Izvestnye aliases</h3>
      <pre id="aliases">—</pre>
    </div>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function load(){
  const r = await fetch('/admin/lm_bootstrap/status'); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('sys').textContent = JSON.stringify(j.system, null, 2);
  document.getElementById('inst').textContent = JSON.stringify(j.installers, null, 2);
  document.getElementById('aliases').textContent = JSON.stringify(j.aliases, null, 2);
  document.getElementById('raw').textContent = JSON.stringify(j, null, 2);
}
async function plan(){
  const r = await fetch('/admin/lm_bootstrap/plan_install',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('inst').textContent = JSON.stringify(j, null, 2);
}
async function run(){
  const r = await fetch('/admin/lm_bootstrap/run_install',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('inst').textContent = JSON.stringify(j, null, 2);
}
async function check(){
  const ep=document.getElementById('ep').value.trim(); if(!ep) return;
  const r = await fetch('/admin/lm_bootstrap/check_endpoint',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint: ep})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('chk').textContent = JSON.stringify(j, null, 2);
  if(j?.endpoint){ document.getElementById('ep').value = j.endpoint; }
  if(j?.models?.length){ document.getElementById('model').value = j.models[0]; }
}
async function bind(){
  const alias=document.getElementById('alias').value.trim();
  const ep=document.getElementById('ep').value.trim();
  const model=document.getElementById('model').value.trim();
  if(!alias||!ep||!model) return;
  const r = await fetch('/admin/lm_bootstrap/auto_bind',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({alias, endpoint: ep, model})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('bind').textContent = JSON.stringify(j, null, 2);
  await load();
}
async function smoke(){
  const ep=document.getElementById('ep').value.trim();
  const model=document.getElementById('model').value.trim();
  const prompt=document.getElementById('prompt').value;
  const maxtok=parseInt(document.getElementById('maxtok').value,10)||8;
  const temp=parseFloat(document.getElementById('temp').value)||0.0;
  if(!ep||!model) return;
  const r = await fetch('/admin/lm_bootstrap/smoke_chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint: ep, model, prompt, max_tokens: maxtok, temperature: temp})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('smk').textContent = JSON.stringify(j, null, 2);
}
load().catch(()=>{});
</script>
</body>
</html>
