<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Portable / One-Click USB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px;cursor:pointer}
    button:hover{filter:brightness(1.1)}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    .muted{opacity:.7}
    code{background:#0b121d;padding:2px 6px;border-radius:6px}
  </style>
  </head>
<body>
  <h1>One-Click USB <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section>
    <h3>Status</h3>
    <div id="st">—</div>
    <div class="muted">V <code>AB_MODE=A</code> peremennye iz <code>active.env</code> ne primenyayutsya, tolko logiruyutsya.</div>
  </section>

  <section>
    <h3>Sborka</h3>
    <div style="margin-bottom:8px">
      <button onclick="previewPlan()">Predprosmotr plana</button>
      <button onclick="applyPlan()">Sobrat fleshku (zapisat)</button>
      <span id="res" class="chip">—</span>
    </div>
    <pre id="plan">—</pre>
  </section>

  <section>
    <h3>RAW</h3>
    <pre id="raw">—</pre>
  </section>

<script>
async function jget(u,opts){ const r=await fetch(u,opts); return await r.json().catch(()=>({ok:false})); }
function esc(s){return (s??"").toString().replace(/</g,"&lt;")}
async function loadStatus(){
  const j=await jget('/admin/portable/oneclick/status');
  document.getElementById('raw').textContent=JSON.stringify(j,null,2);
  if(!j.ok) return;
  const penv=j.portable_env||{};
  const envBadge = penv.present ?
    `<b>active.env:</b> da · <code>${esc(penv.path||"")}</code>` : "<b>active.env:</b> net";
  document.getElementById('st').innerHTML = `USB: <b>${j.usb?'da':'net'}</b> · sys: <code>${esc(j.sys.os)}/${esc(j.sys.arch)}</code> · ${envBadge}`;
}
async function previewPlan(){
  const j=await jget('/admin/portable/oneclick/preview',{method:'POST'});
  document.getElementById('raw').textContent=JSON.stringify(j,null,2);
  document.getElementById('res').textContent = j.ok ? "OK" : "ERR";
  document.getElementById('plan').textContent = JSON.stringify(j.plan||{}, null, 2);
}
async function applyPlan(){
  const j=await jget('/admin/portable/oneclick/apply',{method:'POST'});
  document.getElementById('raw').textContent=JSON.stringify(j,null,2);
  document.getElementById('res').textContent = j.ok ? "OK" : "ERR";
}
loadStatus().catch(()=>{});
</script>
</body>
</html>
