<!doctype html>
<meta charset="utf-8">
<title>Ester — Auto Template Labeler</title>
<style>
  body{font:14px/1.45 system-ui,Segoe UI,Roboto,Arial;margin:20px;max-width:880px}
  textarea,input,button{padding:8px;border:1px solid #ccc;border-radius:8px}
  textarea{width:100%;min-height:120px}
  pre{background:#0b0b0b;color:#99f999;padding:10px;border-radius:8px;min-height:140px;white-space:pre-wrap}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0}
</style>
<h2>Auto Template Labeler</h2>
<div class="row">
  <button onclick="demo()">Ingest demo</button>
  win_w <input id="ww" type="number" value="120">
  win_h <input id="wh" type="number" value="48">
  thr <input id="thr" type="number" step="0.01" value="0.82">
  lang <input id="lang" value="eng+rus">
  <button onclick="suggest()">Suggest</button>
  <button onclick="export_()">Export</button>
</div>
<textarea id="src">[{"screen_b64":"...","click":{"x":640,"y":360},"title":"Save button"}]</textarea>
<pre id="out"></pre>
<script>
async function j(m,u,b){ const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):null}); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t}} }
function out(x){ document.getElementById('out').textContent=JSON.stringify(x,null,2); }
function demo(){ src.value='[{"screen_b64":"...","click":{"x":640,"y":360},"title":"Save button"},{"screen_b64":"...","click":{"x":220,"y":120},"title":"Export"}]'; ingest(); }
async function ingest(){ out(await j('POST','/auto_template/ingest',{"samples":JSON.parse(src.value||"[]")})); }
async function suggest(){ out(await j('POST','/auto_template/suggest',{"win_w":+ww.value,"win_h":+wh.value,"threshold_base":+thr.value,"lang":lang.value})); }
async function export_(){ const r=await fetch('/auto_template/export'); out(await r.json()); }
</script>
