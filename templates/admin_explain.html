<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Explain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body {font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; color:#111;}
    h1 {margin: 0 0 12px 0;}
    textarea {width:100%; min-height:120px; padding:10px; border:1px solid #ddd; border-radius:10px;}
    .row {display:flex; gap:12px; margin: 12px 0;}
    button {padding:10px 14px; border-radius:10px; border:1px solid #ddd; cursor:pointer;}
    pre {background:#f7f7f7; padding:10px; border-radius:10px; overflow:auto; max-height:50vh;}
    input[type=text]{padding:8px 12px; border:1px solid #ddd; border-radius:10px;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
    .card{background:#fafafa; border:1px solid #eee; border-radius:12px; padding:12px;}
  </style>
</head>
<body>
  <h1>Obyasnitel Ester</h1>
  <div class="row">
    <input id="aud" type="text" placeholder="auditoriya (engineer|finance|cook|general)"/>
    <button onclick="run()">Obyasni</button>
  </div>
  <textarea id="txt" placeholder="Vstavte tekst dlya obyasneniya..."></textarea>

  <div class="grid" style="margin-top:12px;">
    <div class="card">
      <h3>Plain</h3>
      <pre id="plain">—</pre>
    </div>
    <div class="card">
      <h3>Metaphor</h3>
      <pre id="meta">—</pre>
    </div>
  </div>
  <div class="card" style="margin-top:12px;">
    <h3>Visual</h3>
    <pre id="vis">—</pre>
  </div>

  <script>
    async function run(){
      const text = document.getElementById('txt').value || '';
      const audience = document.getElementById('aud').value || null;
      const r = await fetch('/explain/with_metaphor', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({text, audience})
      });
      const j = await r.json();
      document.getElementById('plain').textContent = j.plain || '—';
      document.getElementById('meta').textContent = j.metaphor || '—';
      document.getElementById('vis').textContent = j.visual || '—';
    }
  </script>
</body>
</html>
