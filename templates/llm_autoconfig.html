<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — LLM Avtokonfig</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,textarea,select{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    textarea{width:100%;height:80px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    .muted{color:#9aa9bd}
    input[type="text"]{min-width:260px}
  </style>
  <!--
    Zemnoy abzats:
      «Pusko-naladka» LLM: detekt dvizhkov, plan popolneniya modeley iz lokalnykh .gguf (cherez Ollama), testovyy chat.
    Mosty:
      • Yavnyy — nablyudaemost+deystviya v odnom ekrane.
      • Skrytye — AB-rezhim i tolko lokalnye resursy (bez interneta).
  -->
</head>
<body>
  <h1>LLM Avtokonfig <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section>
    <h3>Nastroyki</h3>
    <div class="row">
      <label><input type="checkbox" id="enable"/> Enable</label>
      <label>Interval <input id="interval" type="number" value="900" style="width:120px"/></label>
      <label>Backend
        <select id="backend">
          <option value="auto">auto</option>
          <option value="lmstudio">lmstudio</option>
          <option value="ollama">ollama</option>
        </select>
      </label>
      <label>Min models <input id="min" type="number" value="1" style="width:120px"/></label>
      <label>LM Studio port <input id="lmp" type="number" value="1234" style="width:120px"/></label>
      <label>Ollama port <input id="olp" type="number" value="11434" style="width:120px"/></label>
      <label>Search paths (one per line)</label>
      <textarea id="paths"></textarea>
      <label>Prefers (one per line)</label>
      <textarea id="pref"></textarea>
      <label>Test prompt <input id="tpr" type="text" value="Privet! Skazhi 'ok' odnim slovom."/></label>
      <button onclick="save()">Save</button>
    </div>
    <pre id="cfg">—</pre>
  </section>

  <section>
    <h3>Deystviya</h3>
    <div class="row">
      <button onclick="status()">Status</button>
      <button onclick="plan()">Plan</button>
      <button onclick="apply()">Primenit plan</button>
      <button onclick="selfcheck()">Self-check</button>
    </div>
    <pre id="out">—</pre>
  </section>

<script>
function toLines(arr){return (arr||[]).join('\n');}
function fromLines(s){return (s||'').split('\n').map(x=>x.trim()).filter(Boolean);}
async function status(){
  const r = await fetch('/admin/llm/autoconfig/status'); const j = await r.json().catch(()=>({ok:false}));
  if(!j.ok){ document.getElementById('out').textContent='Oshibka'; return; }
  const s=j.settings||{};
  document.getElementById('enable').checked=!!s.enable;
  document.getElementById('interval').value=s.interval||900;
  document.getElementById('backend').value=s.backend||'auto';
  document.getElementById('min').value=s.min_models||1;
  document.getElementById('lmp').value=s.lmstudio_port||1234;
  document.getElementById('olp').value=s.ollama_port||11434;
  document.getElementById('paths').value=toLines(s.search_paths||[]);
  document.getElementById('pref').value=toLines(s.prefers||[]);
  document.getElementById('tpr').value=s.test_prompt||'';
  document.getElementById('cfg').textContent=JSON.stringify(j, null, 2);
}
async function save(){
  const body={
    enable: document.getElementById('enable').checked,
    interval: parseInt(document.getElementById('interval').value,10),
    backend: document.getElementById('backend').value,
    min_models: parseInt(document.getElementById('min').value,10),
    lmstudio_port: parseInt(document.getElementById('lmp').value,10),
    ollama_port: parseInt(document.getElementById('olp').value,10),
    search_paths: fromLines(document.getElementById('paths').value),
    prefers: fromLines(document.getElementById('pref').value),
    test_prompt: document.getElementById('tpr').value
  };
  const r = await fetch('/admin/llm/autoconfig/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('cfg').textContent=JSON.stringify(j, null, 2);
}
async function plan(){
  const r = await fetch('/admin/llm/autoconfig/plan',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
async function apply(){
  const r = await fetch('/admin/llm/autoconfig/apply',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
async function selfcheck(){
  const r = await fetch('/admin/llm/autoconfig/selfcheck',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
status().catch(()=>{});
</script>
</body>
</html>
