<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester — Portable replikatsiya (P2P)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:0;padding:16px;background:#0b0f14;color:#e6eef7}
    h1{font-size:20px;margin:0 0 12px}
    section{background:#111826;border:1px solid #273244;border-radius:12px;padding:16px;margin:12px 0}
    button,input,textarea,select{background:#1b2432;color:#e6eef7;border:1px solid #38465c;border-radius:8px;padding:8px 12px}
    button:hover{filter:brightness(1.1)}
    textarea{width:100%;height:80px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .chip{display:inline-block;padding:2px 8px;border:1px solid #38465c;border-radius:999px;margin-left:6px}
    pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace}
    input[type="text"]{min-width:280px}
  </style>
  <!--
    Zemnoy abzats:
      «Otdat/Zabrat» — indeksiruy current v bloki, podelis manifestom s LAN, zaberi u soseda tolko nedostayuschee i (opts.) aktiviruy.
    Mosty:
      • Yavnyy — ekspluatatsiya cherez odin ekran.
      • Skrytye — kheshi/bloki i lokalnaya set/token.
  -->
</head>
<body>
  <h1>Portable replikatsiya <span class="chip">AB_MODE: <b id="ab">{{ ab }}</b></span></h1>

  <section>
    <h3>Status</h3>
    <div class="row">
      <button onclick="status()">Obnovit</button>
      <button onclick="indexNow()">Indeksirovat</button>
      <button onclick="offer()">Otdavat</button>
    </div>
    <pre id="st">—</pre>
  </section>

  <section>
    <h3>Zabrat s uzla</h3>
    <div class="row">
      <input id="peer" type="text" placeholder="http://192.168.1.50:8000"/>
      <button onclick="pull()">Zabrat</button>
    </div>
    <pre id="out">—</pre>
  </section>

  <section>
    <h3>Aktivatsiya versii</h3>
    <div class="row">
      <input id="ver" type="text" placeholder="naprimer, 2025.09.29-r1"/>
      <input id="hc" type="text" placeholder="health_cmd (opts.)"/>
      <button onclick="activate()">Aktivirovat</button>
    </div>
    <pre id="act">—</pre>
  </section>

<script>
async function status(){
  const r = await fetch('/admin/portable/replica/status'); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('st').textContent = JSON.stringify(j, null, 2);
}
async function indexNow(){
  const r = await fetch('/admin/portable/replica/index',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('st').textContent = JSON.stringify(j, null, 2);
}
async function offer(){
  const r = await fetch('/admin/portable/replica/offer',{method:'POST'}); const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('st').textContent = JSON.stringify(j, null, 2);
}
async function pull(){
  const peer = document.getElementById('peer').value.trim();
  const r = await fetch('/admin/portable/replica/pull',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({peer})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
async function activate(){
  const version = document.getElementById('ver').value.trim();
  const health_cmd = document.getElementById('hc').value.trim();
  const r = await fetch('/admin/portable/replica/activate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({version, health_cmd})});
  const j = await r.json().catch(()=>({ok:false}));
  document.getElementById('act').textContent = JSON.stringify(j, null, 2);
}
status().catch(()=>{});
</script>
</body>
</html>
