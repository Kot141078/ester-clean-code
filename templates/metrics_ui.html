{% extends "_admin_base.html" %}
{% block content %}
<section class="card" style="margin-bottom:12px">
  <div class="row" style="gap:10px;align-items:center;flex-wrap:wrap">
    <h2 style="margin:0">Metriki (UI)</h2>
    <span class="chip">/metrics/ui</span>
    <div class="spacer"></div>
    <a class="navlink" href="/portal">← Nazad v /portal</a>
  </div>
</section>

<section class="card">
  <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap:16px">
    <div class="box">
      <h4>Uptime</h4>
      <p><b>{{ uptime_sec }}</b> sek</p>
    </div>
    <div class="box">
      <h4>Process RSS</h4>
      <p><b>{{ rss }}</b> bayt{% if not psutil %} <span class="chip">psutil ne ustanovlen</span>{% endif %}</p>
    </div>
  </div>
  <p style="margin-top:12px">JSON-versiya dostupna na <code>/metrics</code>.</p>
</section>
{% endblock %}
