<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;color:#111}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:12px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #eee;padding:6px 8px;text-align:left;font-size:14px}
    th{background:#f7f7f7}
    pre{background:#f7f7f7;border:1px solid #eee;border-radius:10px;padding:10px;max-height:45vh;overflow:auto}
  </style>
</head>
<body>
  <h1>Dokumentatsiya • ENV i marshruty</h1>
  <div class="grid">
    <div class="card">
      <h3>ENV</h3>
      <table id="env"><thead><tr><th>Peremennaya</th><th>Znachenie</th><th>Po umolchaniyu</th><th>Opisanie</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card">
      <h3>Marshruty</h3>
      <pre id="routes">—</pre>
    </div>
  </div>
<script>
async function load(){
  const e = await (await fetch('/docs/env')).json();
  const r = await (await fetch('/docs/routes')).json();

  const tbody = document.querySelector('#env tbody');
  tbody.innerHTML = '';
  const entries = Object.entries(e.env || {}).sort((a,b)=>a[0].localeCompare(b[0]));
  for(const [k,v] of entries){
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><code>${k}</code></td><td>${String(v.value)}</td><td>${String(v.default)}</td><td>${v.desc}</td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('routes').textContent = JSON.stringify(r.routes || [], null, 2);
}
load();
</script>
</body>
</html>
