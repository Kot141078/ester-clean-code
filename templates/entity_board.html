<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Suschnosti — Doska</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;background:#0b0f14;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    header{padding:12px 16px;background:#0f1620;border-bottom:1px solid #1f2937;color:#93c5fd;display:flex;gap:8px;align-items:center}
    input,select,button{background:#0b1220;color:#e5e7eb;border:1px solid #1f2937;border-radius:8px;padding:8px 10px}
    main{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 56px)}
    .list{overflow:auto;border-right:1px solid #1f2937}
    .item{padding:10px 12px;border-bottom:1px solid #1f2937;cursor:pointer}
    .item:hover{background:#0b1220}
    .pane{padding:12px;overflow:auto}
    pre{white-space:pre-wrap;background:#0b1220;padding:10px;border-radius:8px;border:1px solid #1f2937}
    .id{font-size:12px;opacity:.7}
  </style>
</head>
<body>
<header>
  <div>Suschnosti — Doska</div>
  <select id="etype">
    <option value="person">person</option>
    <option value="org">org</option>
    <option value="doc" selected>doc</option>
    <option value="task">task</option>
  </select>
  <input id="q" placeholder="filtr po imeni…">
  <button id="go">Pokazat</button>
  <a href="/mem/explorer" target="_blank" style="margin-left:auto;color:#93c5fd;text-decoration:none">Memory →</a>
</header>
<main>
  <div class="list" id="list"></div>
  <div class="pane" id="pane"><div style="opacity:.7">Vyberite suschnost sleva…</div></div>
</main>
<script>
const list = document.getElementById('list'), pane = document.getElementById('pane');
const q = document.getElementById('q'), etype = document.getElementById('etype');
const go = document.getElementById('go');

function el(tag, cls, txt){ const e=document.createElement(tag); if(cls) e.className=cls; if(txt) e.textContent=txt; return e; }

async function load() {
  list.innerHTML = '';
  const r = await fetch('/mem/entity/list?type=' + encodeURIComponent(etype.value));
  const j = await r.json();
  if (!j.ok) { list.textContent = 'Oshibka'; return; }
  const filter = (q.value||'').toLowerCase();
  for (const it of j.items) {
    if (filter && !(it.name||'').toLowerCase().includes(filter)) continue;
    const d = el('div','item');
    d.appendChild(el('div','id', `${it.type} • ${it.id}`));
    d.appendChild(el('div',null, it.name || '(bez imeni)'));
    d.addEventListener('click', () => openItem(it.id, it.type));
    list.appendChild(d);
  }
}
async function openItem(id, type) {
  const r = await fetch('/mem/entity/get?id='+encodeURIComponent(id)+'&type='+encodeURIComponent(type));
  const j = await r.json();
  pane.innerHTML = '';
  if (!j.ok) { pane.textContent='Ne naydeno'; return; }
  const pre = document.createElement('pre');
  pre.textContent = JSON.stringify(j.entity, null, 2);
  pane.appendChild(pre);
}
go.addEventListener('click', load);
etype.addEventListener('change', load);
q.addEventListener('keydown', e => { if(e.key==='Enter'){ load(); }});
load();
</script>
</body>
</html>
