<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Ester • Self-Edit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;color:#111}
    textarea{width:100%;min-height:160px;padding:10px;border:1px solid #ddd;border-radius:10px}
    input,button{padding:8px 12px;border:1px solid #ddd;border-radius:10px}
    .row{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
    pre{background:#f7f7f7;padding:10px;border-radius:10px;max-height:50vh;overflow:auto;white-space:pre}
    small{color:#666}
  </style>
</head>
<body>
  <h1>Samoredaktura koda</h1>
  <div class="row">
    <input id="label" placeholder="metka pravki (naprimer hotfix-01)"/>
    <button onclick="dry()">Dry-run</button>
    <button onclick="apply()">Apply</button>
  </div>
  <p><small>V slote <code>SELFEDIT_AB=A</code> razreshen tolko dry-run. Dlya primeneniya ustanovite <code>SELFEDIT_AB=B</code>. Vse fayly bekapyatsya i proveryayutsya.</small></p>
  <textarea id="json" placeholder='JSON: {"label":"...", "edits":[{"path":"routes/health_routes.py","pattern":"@bp.get\\(\"/probe\"\\)","replacement":"@bp.get(\"/probe\")","multiple":false}]}'></textarea>
  <h3>Rezultat</h3>
  <pre id="out">—</pre>

<script>
async function dry(){
  const d = JSON.parse(document.getElementById('json').value || '{"label":"","edits":[]}');
  const r = await fetch('/self_edit/dry_run',{method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify(d)});
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
async function apply(){
  const d = JSON.parse(document.getElementById('json').value || '{"label":"","edits":[]}');
  const r = await fetch('/self_edit/apply',{method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify(d)});
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
</script>
</body>
</html>
