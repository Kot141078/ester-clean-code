version: "3.9"

# Lokalnyy stek nablyudaemosti: Prometheus + Grafana + OTel Collector.
# Scrape tseli:
#  - Esther (http://nost.docker.internal:5000/matrix/prom) - for the local dev server
# Porty:
#  - Prometheus: 9090
#  - Grafana: 3000 (login/password: admin / admin, can be overridden via ENV)
#  - OTLP:       4317 (gRPC), 4318 (HTTP)

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ester-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ester-observability

  grafana:
    image: grafana/grafana:10.4.5
    container_name: ester-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_ANON_ENABLED:-false}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ester-observability

  otel-collector:
    image: otel/opentelemetry-collector:0.103.1
    container_name: ester-otelcol
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped
    networks:
      - ester-observability

networks:
  ester-observability:
    name: ester-observability
