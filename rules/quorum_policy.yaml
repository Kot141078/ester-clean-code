# -*- coding: utf-8 -*-
# rules/corum_police.yaml - quorum policy for high impact actions.

required:
  - match: "scheduler.cancel"
    min_approvals: 2
    allowed_roles: ["owner", "core", "security"]

  - match: "kg.delete"
    min_approvals: 2
    allowed_roles: ["owner", "core", "security"]

  - match: "system.shutdown.request"
    min_approvals: 2
    allowed_roles: ["owner", "core"]

# Quorum session lifetime (seconds)
ttl_sec: 900
