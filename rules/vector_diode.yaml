# -*- coding: utf-8 -*-
# rules/vector_diode.yaml - "data diode" config for vector BC.

outbox_dir: "var/diode/outbox"
inbox_dir:  "var/diode/inbox"
store_dir:  "var/vector_store"   # by default simple JSIONL-store

moderation:
  min_len: 12
  max_len: 20000
  deny_patterns:
    - "(?i)rm -rf"
    - "(?i)curl .*\\|\\s*sh"
    - "(?i)secret\\s*key"
